<!doctype html>
<html lang="ko">
<head>
<link rel="preconnect" href="https://www.gstatic.com" crossorigin>
<link rel="preconnect" href="https://accounts.google.com">
<link rel="dns-prefetch" href="https://www.gstatic.com">
<link rel="dns-prefetch" href="https://accounts.google.com">
<script src="./auth.js"></script>
<script>window.__athomeNeedsFirestore__ = true;</script>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>앳홈 아이디어 노트</title>
<script>
  if (new URLSearchParams(location.search).get('shell') === '1') {
    document.documentElement.classList.add('shell-mode');
  }
</script>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%231A1A1A'/><rect x='20' y='20' width='60' height='60' rx='6' fill='%23FFD34D' transform='rotate(-6 50 50)'/></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
:root{
  --accent:#FF5D00; --accent-light:rgba(255,93,0,.08);
  --dark:#1A1A1A; --text-1:#1A1714; --text-2:#4A4540; --text-3:#6B6660; --text-4:#A8A29A;
  --bg-page:#F5F4F1; --bg-card:#FFFFFF; --bg-soft:#F0EEE9; --bg-gray:#E9E6E0;
  --border:#ECEAE5; --border-2:#DAD6CF;
  --shadow:0 1px 2px rgba(40,30,20,.03),0 3px 14px rgba(40,30,20,.035);
  --font:'Pretendard Variable',Pretendard,-apple-system,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;}
html,body{height:100%;margin:0;}
body{font-family:var(--font);font-size:14px;color:var(--text-1);background:var(--bg-page);-webkit-font-smoothing:antialiased;letter-spacing:-.006em;overflow:hidden;}

/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:60;background:rgba(245,244,241,.9);backdrop-filter:saturate(180%) blur(10px);-webkit-backdrop-filter:saturate(180%) blur(10px);border-bottom:1px solid var(--border);}
.topbar-in{max-width:none;margin:0;padding:13px 24px;display:flex;align-items:center;gap:14px;}
.shell-mode .topbar .brand{display:none!important;}
.brand{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.brand img{height:15px;display:block;}
.brand b{font-size:15px;font-weight:800;letter-spacing:-.02em;}
.brand .sep{width:1px;height:16px;background:var(--border-2);}
.brand span{font-size:13px;font-weight:700;color:var(--text-3);}
.spacer{flex:1;}
.count{font-size:12px;font-weight:700;color:var(--text-4);}
.btn{border:1px solid var(--border-2);background:var(--bg-card);color:var(--text-2);border-radius:9px;padding:8px 13px;font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer;transition:all .14s;white-space:nowrap;}
.btn:hover{border-color:var(--text-4);color:var(--text-1);}
.btn--primary{background:var(--accent);color:#fff;border-color:transparent;font-weight:700;}
.btn--primary:hover{opacity:.9;color:#fff;}
.btn--ghost{border-color:transparent;background:none;color:var(--text-4);}
.btn--ghost:hover{color:var(--down,#DC2626);}

/* ── BOARD ── */
.board-scroll{position:relative;height:calc(100vh - 58px);overflow:auto;}
.shell-mode .board-scroll{height:calc(100vh - 58px);}
.board{position:relative;min-width:1600px;min-height:1400px;width:max-content;height:max-content;
  background-image:radial-gradient(circle,rgba(40,30,20,.07) 1px,transparent 1px);
  background-size:22px 22px;
}
.board-empty{position:absolute;top:120px;left:50%;transform:translateX(-50%);text-align:center;color:var(--text-4);font-size:13px;font-weight:600;pointer-events:none;width:280px;}
.board-empty b{display:block;font-size:15px;color:var(--text-3);margin-bottom:6px;}

/* ── NOTE ── */
.note{position:absolute;width:220px;height:190px;min-width:150px;min-height:120px;
  border-radius:2px 2px 10px 10px;box-shadow:0 3px 10px rgba(40,30,20,.16),0 1px 2px rgba(40,30,20,.08);
  display:flex;flex-direction:column;overflow:hidden;resize:both;transition:box-shadow .15s;
}
.note:hover{box-shadow:0 8px 22px rgba(40,30,20,.22),0 2px 4px rgba(40,30,20,.1);}
.note.dragging,.note.resizing{transition:none;box-shadow:0 16px 34px rgba(40,30,20,.3);z-index:999!important;}
.note-head{height:22px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 6px 0 9px;cursor:grab;-webkit-user-select:none;user-select:none;}
.note-head:active{cursor:grabbing;}
.note-dot{width:9px;height:9px;border-radius:50%;border:1.5px solid rgba(0,0,0,.15);flex-shrink:0;}
.note-swatches{position:absolute;display:none;gap:5px;background:#1A1A1A;padding:6px;border-radius:9px;box-shadow:0 8px 20px rgba(0,0,0,.28);z-index:1000;}
.note-swatches.open{display:flex;}
.note-swatches button{width:16px;height:16px;border-radius:50%;border:1.5px solid rgba(255,255,255,.5);cursor:pointer;padding:0;}
.note-del{background:none;border:none;font-size:14px;line-height:1;color:rgba(0,0,0,.35);cursor:pointer;padding:2px 4px;border-radius:5px;}
.note-del:hover{color:rgba(0,0,0,.7);background:rgba(0,0,0,.08);}
.note-body{flex:1;min-height:0;padding:2px 13px 13px;font-size:13.5px;font-weight:600;line-height:1.55;color:rgba(0,0,0,.78);outline:none;overflow-y:auto;white-space:pre-wrap;word-break:break-word;}
.note-body:empty::before{content:attr(data-ph);color:rgba(0,0,0,.32);font-weight:500;}
.note-time{position:absolute;bottom:5px;right:10px;font-size:9.5px;font-weight:700;color:rgba(0,0,0,.28);pointer-events:none;}

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#1A1A1A;color:#fff;padding:11px 20px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:opacity .2s;z-index:2000;}
.toast.show{opacity:1;}

@media(max-width:820px){
  .brand span{display:none;} .count{display:none;}
}
</style>
</head>
<body>
<header class="topbar">
  <div class="topbar-in">
    <div class="brand">
      <img src="https://raw.githubusercontent.com/beodle/athome-assets/main/ATHOME_CI_screen.svg" alt="ATHOME" style="filter:none">
      <b>채용 콘텐츠</b><div class="sep"></div><span>아이디어 노트</span>
    </div>
    <div class="spacer"></div>
    <span class="count" id="noteCount">0개</span>
    <button class="btn btn--ghost" id="clearBtn" title="모든 노트 삭제">전체 삭제</button>
    <button class="btn btn--primary" id="addBtn">＋ 새 노트</button>
  </div>
</header>

<div class="board-scroll" id="boardScroll">
  <div class="board" id="board">
    <div class="board-empty" id="boardEmpty"><b>아직 노트가 없어요</b>떠오른 아이디어를 놓치지 말고<br>＋ 새 노트로 바로 남겨보세요</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  const COLORS = ['#FFE38F','#FFC9A3','#C9E9C6','#BFDBFE','#E3D3F7','#FFC9DC'];
  const board = document.getElementById('board');
  const boardScroll = document.getElementById('boardScroll');
  const boardEmpty = document.getElementById('boardEmpty');
  const noteCountEl = document.getElementById('noteCount');
  const toastEl = document.getElementById('toast');

  // 노트는 팀 전체가 공유하는 Firestore 컬렉션(ideaNotes)에 문서 하나당 하나씩 저장된다.
  // 로컬 상태는 실시간 스냅샷을 그대로 반영하는 캐시일 뿐, source of truth는 Firestore.
  let db = null;
  const notesById = new Map(); // id -> 노트 데이터
  const elsById = new Map();   // id -> 렌더된 DOM 엘리먼트
  let zTop = 1;

  // 지금 이 브라우저에서 편집/드래그/리사이즈 중인 노트는 원격 스냅샷이 와도 DOM을 덮어쓰지 않는다
  // (안 그러면 타이핑 중 커서가 튀거나 드래그 중 위치가 되돌아가는 등 다른 사람 동시 편집과 충돌한다).
  let activeId = null, activeIdleTimer = null;
  function markActive(id){
    activeId = id;
    clearTimeout(activeIdleTimer);
    activeIdleTimer = setTimeout(()=>{ if(activeId===id) activeId=null; }, 600);
  }
  function clearActive(id){
    if(activeId===id){ activeId = null; clearTimeout(activeIdleTimer); }
  }

  const roById = new Map(); // id -> ResizeObserver (삭제 시 반드시 disconnect 해야 함)

  // 노트 DOM과 옵저버를 한 곳에서 정리 — 로컬 삭제든 원격(다른 사람) 삭제든 동일하게 사용.
  // ResizeObserver를 끊지 않고 el.remove()만 하면, 크기가 0으로 줄어드는 것을 리사이즈로 감지해서
  // scheduleNoteSave({w:0,h:0})가 호출되어 방금 지운 노트를 Firestore에 다시 만들어버리는 버그가 생긴다.
  function removeNoteDom(id){
    const ro = roById.get(id);
    if(ro) ro.disconnect();
    roById.delete(id);
    const el = elsById.get(id);
    if(el) el.remove();
    elsById.delete(id);
    notesById.delete(id);
  }

  // 같은 노트에 대한 연속된 필드 변경(타이핑, 드래그 등)을 짧게 모아 한 번의 Firestore 쓰기로 합친다.
  const pendingWrites = new Map(); // id -> {patch, timer}
  function scheduleNoteSave(id, patch){
    const entry = pendingWrites.get(id) || { patch:{} };
    Object.assign(entry.patch, patch);
    clearTimeout(entry.timer);
    entry.timer = setTimeout(()=>{
      pendingWrites.delete(id);
      if(!db) return;
      db.collection('ideaNotes').doc(id).set(entry.patch, { merge:true }).catch(err=>{
        console.error('[ideas] save failed', err);
        showToast('저장 실패: 네트워크를 확인해주세요');
      });
    }, 200);
    pendingWrites.set(id, entry);
  }
  function cancelPendingSave(id){
    const entry = pendingWrites.get(id);
    if(entry){ clearTimeout(entry.timer); pendingWrites.delete(id); }
  }

  function uid(){ return 'n' + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

  function showToast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(()=>toastEl.classList.remove('show'), 1600);
  }

  function updateEmptyState(){
    boardEmpty.style.display = notesById.size ? 'none' : 'block';
    noteCountEl.textContent = notesById.size + '개';
  }

  function renderNote(data){
    const el = document.createElement('div');
    el.className = 'note';
    el.dataset.id = data.id;
    el.style.left = data.x + 'px';
    el.style.top = data.y + 'px';
    el.style.width = (data.w||220) + 'px';
    el.style.height = (data.h||190) + 'px';
    el.style.background = data.color;
    el.style.zIndex = data.z||1;
    el.style.transform = 'rotate(' + (data.rot||0) + 'deg)';

    const head = document.createElement('div');
    head.className = 'note-head';

    const dot = document.createElement('button');
    dot.className = 'note-dot';
    dot.style.background = data.color;
    dot.title = '색상 변경';
    dot.addEventListener('pointerdown', (e)=> e.stopPropagation());
    dot.addEventListener('click', (e)=>{
      e.stopPropagation();
      openSwatches(dot, data.id);
    });

    const del = document.createElement('button');
    del.className = 'note-del';
    del.textContent = '✕';
    del.title = '노트 삭제';
    del.addEventListener('pointerdown', (e)=> e.stopPropagation());
    del.addEventListener('click', (e)=>{
      e.stopPropagation();
      cancelPendingSave(data.id);
      removeNoteDom(data.id);
      updateEmptyState();
      if(db) db.collection('ideaNotes').doc(data.id).delete().catch(err=>{
        console.error('[ideas] delete failed', err);
        showToast('삭제 실패: 네트워크를 확인해주세요');
      });
    });

    head.appendChild(dot);
    head.appendChild(del);

    const body = document.createElement('div');
    body.className = 'note-body';
    body.contentEditable = 'true';
    body.dataset.ph = '아이디어를 적어보세요…';
    body.textContent = data.text || '';
    body.addEventListener('focus', ()=> markActive(data.id));
    body.addEventListener('blur', ()=> clearActive(data.id));
    body.addEventListener('input', ()=>{
      data.text = body.textContent;
      markActive(data.id);
      scheduleNoteSave(data.id, { text: data.text });
    });
    body.addEventListener('mousedown', (e)=> e.stopPropagation());

    el.appendChild(head);
    el.appendChild(body);
    board.appendChild(el);
    elsById.set(data.id, el);

    // drag
    head.addEventListener('pointerdown', (e)=>{
      e.preventDefault();
      bringToFront(data, el);
      markActive(data.id);
      const startX = e.clientX, startY = e.clientY;
      const origX = data.x, origY = data.y;
      el.classList.add('dragging');
      head.setPointerCapture(e.pointerId);

      function onMove(ev){
        data.x = origX + (ev.clientX - startX);
        data.y = origY + (ev.clientY - startY);
        el.style.left = data.x + 'px';
        el.style.top = data.y + 'px';
        markActive(data.id);
      }
      function onUp(){
        el.classList.remove('dragging');
        head.removeEventListener('pointermove', onMove);
        head.removeEventListener('pointerup', onUp);
        scheduleNoteSave(data.id, { x: data.x, y: data.y });
      }
      head.addEventListener('pointermove', onMove);
      head.addEventListener('pointerup', onUp, {once:true});
    });

    // resize persistence (CSS resize handle, bottom-right)
    const ro = new ResizeObserver(entries=>{
      const r = entries[0].contentRect;
      if(Math.round(r.width)!==data.w || Math.round(r.height)!==data.h){
        data.w = Math.round(r.width);
        data.h = Math.round(r.height);
        markActive(data.id);
        scheduleNoteSave(data.id, { w: data.w, h: data.h });
      }
    });
    ro.observe(el);
    roById.set(data.id, ro);

    el.addEventListener('pointerdown', ()=> bringToFront(data, el));

    return el;
  }

  // 원격(다른 사람) 변경분을 기존 DOM에 그대로 반영 — 리스너를 다시 붙이지 않고 값만 갱신한다
  function patchNoteDom(el, data){
    el.style.left = data.x + 'px';
    el.style.top = data.y + 'px';
    el.style.width = (data.w||220) + 'px';
    el.style.height = (data.h||190) + 'px';
    el.style.background = data.color;
    el.style.zIndex = data.z||1;
    el.style.transform = 'rotate(' + (data.rot||0) + 'deg)';
    const dot = el.querySelector('.note-dot');
    if(dot) dot.style.background = data.color;
    const body = el.querySelector('.note-body');
    if(body && body.textContent !== (data.text||'')) body.textContent = data.text || '';
  }

  function bringToFront(data, el){
    zTop += 1;
    data.z = zTop;
    el.style.zIndex = zTop;
    scheduleNoteSave(data.id, { z: zTop });
  }

  let swatchPop = null;
  function openSwatches(anchorEl, noteId){
    closeSwatches();
    const pop = document.createElement('div');
    pop.className = 'note-swatches open';
    COLORS.forEach(c=>{
      const b = document.createElement('button');
      b.style.background = c;
      b.addEventListener('click', (e)=>{
        e.stopPropagation();
        const data = notesById.get(noteId);
        if(!data) return;
        data.color = c;
        const noteEl = elsById.get(noteId);
        if(noteEl) noteEl.style.background = c;
        anchorEl.style.background = c;
        scheduleNoteSave(noteId, { color: c });
        closeSwatches();
      });
      pop.appendChild(b);
    });
    document.body.appendChild(pop);
    const r = anchorEl.getBoundingClientRect();
    pop.style.left = r.left + 'px';
    pop.style.top = (r.bottom + 6) + 'px';
    swatchPop = pop;
    setTimeout(()=>document.addEventListener('click', closeSwatches, {once:true}), 0);
  }
  function closeSwatches(){
    if(swatchPop){ swatchPop.remove(); swatchPop = null; }
  }

  function addNote(x, y){
    const scroll = boardScroll;
    const col = notesById.size % 6;
    const row = Math.floor(notesById.size / 6);
    const px = x != null ? x : scroll.scrollLeft + 40 + col * 250;
    const py = y != null ? y : scroll.scrollTop + 30 + row * 220;
    const data = {
      id: uid(), x: px, y: py, w: 220, h: 190,
      color: COLORS[notesById.size % COLORS.length],
      rot: Number((Math.random() * 6 - 3).toFixed(1)),
      text: '', z: ++zTop
    };
    notesById.set(data.id, data);
    const el = renderNote(data);
    updateEmptyState();
    scheduleNoteSave(data.id, data); // 최초 생성 — 전체 필드를 그대로 저장
    requestAnimationFrame(()=>{
      el.querySelector('.note-body').focus();
    });
  }

  document.getElementById('addBtn').addEventListener('click', ()=> addNote());
  document.getElementById('clearBtn').addEventListener('click', ()=>{
    if(!notesById.size) return;
    if(!confirm('노트 ' + notesById.size + '개를 모두 삭제할까요? 되돌릴 수 없어요.')) return;
    const ids = [...notesById.keys()];
    ids.forEach(cancelPendingSave);
    ids.forEach(removeNoteDom);
    updateEmptyState();
    if(db){
      const batch = db.batch();
      ids.forEach(id => batch.delete(db.collection('ideaNotes').doc(id)));
      batch.commit().catch(err=>{
        console.error('[ideas] clear-all failed', err);
        showToast('전체 삭제 중 오류가 발생했어요');
      });
    }
    showToast('모든 노트를 삭제했어요');
  });

  boardScroll.addEventListener('dblclick', (e)=>{
    if(e.target !== boardScroll && e.target !== board) return;
    const rect = board.getBoundingClientRect();
    addNote(e.clientX - rect.left - 60, e.clientY - rect.top - 20);
  });

  function handleSnapshot(snapshot){
    snapshot.docChanges().forEach(change=>{
      const id = change.doc.id;
      if(change.type === 'removed'){
        removeNoteDom(id); // 다른 사람이 삭제한 노트 반영
        return;
      }
      const data = Object.assign({ id }, change.doc.data());
      notesById.set(id, data);
      zTop = Math.max(zTop, data.z||1);
      const el = elsById.get(id);
      if(!el){
        renderNote(data); // 다른 사람이 추가한 새 노트
      } else if(id !== activeId){
        patchNoteDom(el, data); // 내가 지금 만지고 있지 않은 노트만 원격 값으로 갱신
      }
    });
    updateEmptyState();
  }

  function initFirestoreSync(){
    if(db) return;
    db = window.__athomeDb__;
    if(!db){ showToast('동기화 연결에 실패했어요'); return; }
    db.collection('ideaNotes').onSnapshot(handleSnapshot, err=>{
      console.error('[ideas] snapshot error', err);
      showToast('동기화 오류가 발생했어요');
    });
  }
  document.addEventListener('athome-auth-ready', initFirestoreSync);
  if(window.__athomeUser__) initFirestoreSync();

  updateEmptyState();
})();
</script>
</body>
</html>
