<!doctype html>
<html lang="ko">
<head>
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://accounts.google.com">
  <link rel="dns-prefetch" href="https://www.gstatic.com">
  <link rel="dns-prefetch" href="https://accounts.google.com">
  <script src="./auth.js"></script>
  <script>window.__athomeNeedsFirestore__ = true;</script>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- 캐시 재검증: 데이터 갱신 시 일반 새로고침만으로 최신 반영 (강력 새로고침 불필요) -->
  <meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <title>앳홈 채용 콘텐츠 대시보드</title>
  <script>
    if (new URLSearchParams(location.search).get('shell') === '1') {
      document.documentElement.classList.add('shell-mode');
    }
  </script>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%231A1A1A'/><rect x='12' y='55' width='18' height='33' rx='4' fill='%23FF5D00'/><rect x='41' y='35' width='18' height='53' rx='4' fill='%23FF5D00'/><rect x='70' y='18' width='18' height='70' rx='4' fill='%23FF5D00'/></svg>">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
<style>
:root{
  --accent:#FF5D00; --accent-light:rgba(255,93,0,.08); --accent-mid:rgba(255,93,0,.16);
  --dark:#1A1A1A; --text-1:#1A1714; --text-2:#4A4540; --text-3:#6B6660; --text-4:#A8A29A;
  --bg-page:#F5F4F1; --bg-card:#FFFFFF; --bg-soft:#F0EEE9; --bg-gray:#E9E6E0;
  --border:#ECEAE5; --border-2:#DAD6CF;
  --li:#FF5D00; --ga4:#0057FF; --blog:#7C3AED;
  --up:#16A34A; --down:#DC2626;
  --radius:12px;
  --shadow:0 1px 2px rgba(40,30,20,.03),0 3px 14px rgba(40,30,20,.035);
  --font:'Pretendard Variable',Pretendard,-apple-system,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);font-size:14px;color:var(--text-1);background:var(--bg-page);-webkit-font-smoothing:antialiased;letter-spacing:-.006em;line-height:1.6;}
.wrap{max-width:1120px;margin:0 auto;padding:0 24px 64px;}
.stale{background:#FEF3C7;border-bottom:1px solid #FDE68A;padding:6px 24px;font-size:12px;color:#92400E;text-align:center;display:none;}

/* ── 실시간 상태 배너 (성과 KPI와 구분되는 톤) ── */
.status-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--bg-soft);border:1px solid var(--border);border-radius:9px;padding:9px 16px;margin-top:20px;text-decoration:none;color:inherit;transition:border-color .14s,background .14s;}
.status-bar:hover{border-color:var(--border-2);background:var(--bg-gray);}
.status-bar .sb-left{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600;color:var(--text-2);}
.status-bar .sb-dot{width:6px;height:6px;border-radius:50%;background:var(--up);flex-shrink:0;box-shadow:0 0 0 3px rgba(22,163,74,.15);}
.status-bar .sb-right{display:flex;align-items:baseline;gap:10px;font-size:12.5px;color:var(--text-3);}
.status-bar .sb-count{font-size:16px;font-weight:800;color:var(--text-1);letter-spacing:-.02em;}

/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:60;background:rgba(245,244,241,.85);backdrop-filter:saturate(180%) blur(10px);-webkit-backdrop-filter:saturate(180%) blur(10px);border-bottom:1px solid var(--border);}
.topbar-in{max-width:1120px;margin:0 auto;padding:13px 24px;display:flex;align-items:center;gap:14px;}
.shell-mode .topbar .brand{display:none!important;}
.shell-mode .topbar-in{max-width:none;padding-left:24px;padding-right:24px;}
.brand{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.brand img{height:15px;display:block;}
.brand b{font-size:15px;font-weight:800;letter-spacing:-.02em;}
.brand .sep{width:1px;height:16px;background:var(--border-2);}
.brand span{font-size:13px;font-weight:700;color:var(--text-3);}
.spacer{flex:1;}
.actions{display:flex;align-items:center;gap:7px;flex-shrink:0;}
.btn{border:1px solid var(--border-2);background:var(--bg-card);color:var(--text-2);border-radius:9px;padding:8px 12px;font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer;transition:all .14s;white-space:nowrap;}
.btn:hover{border-color:var(--text-4);color:var(--text-1);}
.btn--primary{background:var(--accent);color:#fff;border-color:transparent;font-weight:700;}
.btn--primary:hover{opacity:.9;color:#fff;}
.btn--icon{padding:8px 11px;}
.last-upd{font-size:11.5px;color:var(--text-4);white-space:nowrap;align-self:center;padding-left:14px;border-left:1px solid var(--border-2);}
.more{position:relative;}
.more-menu{min-width:190px;}
.more-menu button{display:block;width:100%;text-align:left;background:none;border:none;border-radius:8px;padding:10px 12px;font-family:inherit;font-size:13px;font-weight:600;color:var(--text-2);cursor:pointer;white-space:nowrap;}
.more-menu button:hover{background:var(--bg-soft);color:var(--text-1);}

/* ── RANGE FILTER ── */
.range{position:relative;display:flex;align-items:center;gap:3px;}
.range-nav{background:var(--bg-card);border:1px solid var(--border-2);border-radius:8px;color:var(--text-2);width:30px;height:34px;cursor:pointer;font-size:15px;transition:all .14s;}
.range-nav:hover:not(:disabled){background:var(--bg-gray);}
.range-nav:disabled{opacity:.3;cursor:default;}
.range-trigger{display:inline-flex;align-items:center;gap:7px;background:var(--bg-card);border:1px solid var(--border-2);border-radius:9px;padding:7px 13px;font-family:inherit;font-size:13px;font-weight:700;color:var(--text-1);cursor:pointer;transition:border-color .14s;white-space:nowrap;}
.range-trigger:hover{border-color:var(--text-4);}
.range-caret{color:var(--text-4);font-size:10px;}
.range-menu{position:absolute;top:calc(100% + 7px);right:0;background:var(--bg-card);border:1px solid var(--border);border-radius:13px;box-shadow:0 14px 40px rgba(40,30,20,.16);padding:7px;min-width:216px;z-index:120;display:none;}
.range-menu.open{display:block;}
.range-menu button[data-range]{display:block;width:100%;text-align:left;background:none;border:none;border-radius:8px;padding:10px 12px;font-family:inherit;font-size:13px;font-weight:600;color:var(--text-2);cursor:pointer;}
.range-menu button[data-range]:hover{background:var(--bg-soft);}
.range-menu button[data-range].on{background:var(--bg-soft);color:var(--text-1);font-weight:700;}
.seg-group{display:inline-flex;gap:2px;background:var(--bg-soft);border-radius:9px;padding:3px;margin-right:6px;}
.seg-group button{border:none;background:none;border-radius:7px;padding:6px 11px;font-family:inherit;font-size:12.5px;font-weight:600;color:var(--text-3);cursor:pointer;white-space:nowrap;transition:color .12s;}
.seg-group button:hover{color:var(--text-1);}
.seg-group button.on{background:#fff;color:var(--text-1);font-weight:700;box-shadow:0 1px 2px rgba(0,0,0,.08);}
.range-custom{border-top:1px solid var(--border);margin-top:7px;padding:11px 8px 4px;}
.range-custom label{display:block;font-size:10px;font-weight:700;color:var(--text-4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px;}
.range-custom .row{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-4);}
.range-custom input{flex:1;min-width:0;border:1px solid var(--border-2);border-radius:8px;padding:7px;font-family:inherit;font-size:12px;color:var(--text-1);background:var(--bg-card);}
.range-apply{width:100%;margin-top:9px;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px;font-family:inherit;font-size:12.5px;font-weight:700;cursor:pointer;}

/* ── SECTIONS ── */
.sec{margin-top:48px;}
.sec-head{display:flex;align-items:baseline;gap:10px;margin-bottom:18px;}
.sec-no{font-size:12px;font-weight:700;color:var(--text-4);letter-spacing:.08em;}
.sec-title{font-size:19px;font-weight:800;letter-spacing:-.03em;}
.sec-desc{font-size:12.5px;color:var(--text-4);font-weight:500;}
.sec-pub{margin-left:auto;font-size:12px;color:var(--text-4);font-weight:600;}
.card{background:var(--bg-card);border-radius:var(--radius);box-shadow:var(--shadow);}
.pad{padding:22px 24px;}
.mb{margin-bottom:14px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.card-h{display:flex;align-items:baseline;gap:8px;margin-bottom:18px;}
.card-h .dot{display:none;}
.card-h .t{font-size:14px;font-weight:700;color:var(--text-1);}
.card-h .sub{font-size:11.5px;color:var(--text-4);font-weight:500;margin-left:auto;}

/* ── KPI ── */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.kpis--5{grid-template-columns:repeat(5,1fr);}
@media(max-width:820px){ .kpis--5{grid-template-columns:repeat(2,1fr);} }
.kpi{background:var(--bg-card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px;transition:transform .14s,box-shadow .14s;}
.kpi:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(40,30,20,.06);}
.kpi-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
.kpi-label{font-size:11.5px;font-weight:600;color:var(--text-3);}
.kpi-val{font-size:31px;font-weight:800;letter-spacing:-.04em;line-height:1.05;}
.kpi-sub{font-size:11.5px;color:var(--text-4);margin:5px 0 10px;}
.cmp{font-size:11px;font-weight:700;display:inline-flex;align-items:center;gap:3px;}
.cmp.up{color:var(--up);} .cmp.down{color:var(--down);} .cmp.flat{color:var(--text-4);}

/* ── CHART ── */
.chart-box{position:relative;height:240px;}
.empty{text-align:center;color:var(--text-4);font-size:13px;padding:32px 0;}

/* ── TABLE ── */
table{width:100%;border-collapse:collapse;}
th{text-align:left;font-size:11px;font-weight:700;color:var(--text-3);letter-spacing:.03em;padding:8px 10px;border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:10px;font-size:13px;color:var(--text-2);border-bottom:1px solid var(--border);}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:var(--bg-soft);}
.wbadge{display:inline-block;font-size:11px;font-weight:800;background:var(--bg-gray);color:var(--text-2);border-radius:5px;padding:2px 8px;}
.tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:5px;background:var(--bg-soft);color:var(--text-3);}
.up-i{color:var(--up);font-size:10px;font-weight:700;margin-left:3px;} .down-i{color:var(--down);font-size:10px;font-weight:700;margin-left:3px;}
.ell{max-width:300px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
/* ② 콘텐츠 기여 3카드: 좁아져도 숫자가 카드 밖으로 안 나가게 고정 레이아웃 */
.roi-grid table{table-layout:fixed;width:100%;}
.roi-grid th,.roi-grid td{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.roi-grid th:not(:first-child),.roi-grid td:not(:first-child){width:84px;}
.roi-grid td.ell{cursor:default;}
.roi-tip{position:fixed;display:none;z-index:300;background:#1A1A1A;color:#fff;padding:7px 11px;border-radius:7px;font-size:12px;line-height:1.45;max-width:380px;box-shadow:0 8px 24px rgba(0,0,0,.22);pointer-events:none;}

/* ── ACCORDION ── */
.acc{margin-top:12px;border-top:1px solid var(--border);}
.acc-btn{width:100%;text-align:left;background:none;border:none;padding:12px 2px 0;font-family:inherit;font-size:12.5px;font-weight:700;color:var(--text-3);cursor:pointer;display:flex;align-items:center;gap:6px;}
.acc-btn:hover{color:var(--text-1);}
.acc-btn .ar{transition:transform .18s;font-size:10px;}
.acc.open .acc-btn .ar{transform:rotate(90deg);}
.acc-body{display:none;padding-top:12px;}
.acc.open .acc-body{display:block;}

/* ── FUNNEL ── */
.funnel-row{padding:5px 0;}
.funnel-arrow{font-size:12px;color:var(--text-4);padding:3px 0 3px 10px;}
.funnel-cvr{font-weight:700;color:var(--text-3);margin-left:4px;}
.funnel-bg{height:26px;background:var(--bg-soft);border-radius:6px;overflow:hidden;}
.funnel-bar{height:100%;border-radius:6px;transition:width .5s ease;}
.funnel-meta{display:flex;align-items:center;gap:10px;margin-top:5px;}
.funnel-label{font-size:13px;font-weight:700;min-width:74px;}
.funnel-count{font-size:15px;font-weight:800;margin-left:auto;}
.funnel-unit{font-size:11px;font-weight:400;color:var(--text-4);}

/* ── DOUGHNUT ── */
.dough-wrap{display:flex;align-items:center;gap:18px;}
.dough-c{width:130px;height:130px;flex-shrink:0;}
.dough-legend{flex:1;min-width:0;}
.dough-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;gap:8px;}
.dough-row:last-child{border-bottom:none;}
.ldot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* ── QUALITY ── */
.q-big{font-size:34px;font-weight:800;letter-spacing:-.03em;line-height:1;}
.chip{display:inline-block;background:var(--bg-soft);color:var(--text-2);font-size:12px;font-weight:600;padding:4px 11px;border-radius:14px;margin:0 6px 6px 0;}
.sa-row{display:flex;justify-content:space-between;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;}
.subt{font-size:11px;font-weight:700;color:var(--text-3);letter-spacing:.05em;margin-bottom:8px;}

/* ── MODAL ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:200;padding:16px;}
.ov.open{display:flex;}
.modal{background:#fff;border-radius:16px;width:100%;max-width:620px;max-height:90vh;overflow-y:auto;padding:26px;}
.modal-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.modal-h h2{font-size:17px;font-weight:800;}
.x{background:none;border:none;font-size:20px;color:var(--text-3);cursor:pointer;}
.field{margin-bottom:8px;} .field label{display:block;font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:4px;}
.inp{width:100%;border:1px solid var(--border-2);border-radius:8px;padding:8px 11px;font-size:13px;font-family:inherit;color:var(--text-1);background:#fff;outline:none;}
.inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,93,0,.1);}
.fgrid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;} .fgrid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.minihead{font-size:11px;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:.05em;margin:16px 0 8px;}
.drop{border:2px dashed var(--border-2);border-radius:10px;padding:18px;text-align:center;cursor:pointer;transition:all .14s;}
.drop:hover,.drop.over{border-color:var(--accent);background:var(--accent-light);}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#1A1A1A;color:#fff;padding:11px 20px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:opacity .2s;z-index:300;}
.toast.show{opacity:1;}

@media(max-width:820px){
  .kpis{grid-template-columns:repeat(2,1fr);} .grid2{grid-template-columns:1fr;}
  .topbar-in{flex-wrap:wrap;} .brand span{display:none;} .last-upd{display:none;} .seg-group button{padding:6px 9px;}
}
@media print{ .topbar,.btn,.acc-btn{display:none;} .card,.kpi{box-shadow:none;break-inside:avoid;} body{background:#fff;} }
</style>
</head>
<body>
<div class="stale" id="stale"></div>

<!-- TOPBAR -->
<header class="topbar">
  <div class="topbar-in">
    <div class="brand">
      <img src="https://raw.githubusercontent.com/beodle/athome-assets/main/ATHOME_CI_screen.svg" alt="ATHOME" style="filter:none">
      <b>채용 콘텐츠</b><div class="sep"></div><span>성과 대시보드</span>
    </div>
    <div class="spacer"></div>
    <div class="range">
      <div class="seg-group">
        <button data-range="1w" onclick="setRange('1w')">1주</button>
        <button data-range="4w" onclick="setRange('4w')">4주</button>
        <button data-range="8w" onclick="setRange('8w')">8주</button>
        <button data-range="12w" onclick="setRange('12w')">12주</button>
      </div>
      <button class="range-nav" id="prevBtn" onclick="shiftRange(-1)" title="이전 기간">←</button>
      <button class="range-trigger" onclick="toggleRange(event)">📅 <span id="rangeLabel">—</span> <span class="range-caret">▾</span></button>
      <button class="range-nav" id="nextBtn" onclick="shiftRange(1)" title="다음 기간">→</button>
      <div class="range-menu" id="rangeMenu" onclick="event.stopPropagation()">
        <button data-range="tm" onclick="setMonthRange(0)">이번 달</button>
        <button data-range="lm" onclick="setMonthRange(-1)">지난 달</button>
        <button data-range="all" onclick="setRange('all')">전체 기간</button>
        <div class="range-custom">
          <label>사용자 지정</label>
          <div class="row"><input type="date" id="cStart"> ~ <input type="date" id="cEnd"></div>
          <button class="range-apply" onclick="applyCustom()">적용</button>
        </div>
      </div>
    </div>
    <span id="lastUpd" class="last-upd" title=""></span>
    <div class="actions">
      <div class="more">
        <button class="btn btn--icon" onclick="toggleMore(event)" title="더보기">⋯</button>
        <div class="range-menu more-menu" id="moreMenu" onclick="event.stopPropagation()">
          <button onclick="closeMore();exportWithData()">↓ 데이터 내보내기</button>
        </div>
      </div>
    </div>
  </div>
</header>

<main class="wrap">

  <!-- 오픈 포지션 (career.athomecorp.com 실시간 미러링 — 기간 필터와 무관한 현재 상태) -->
  <a href="https://career.athomecorp.com/recruit" target="_blank" class="status-bar" id="openPosCard">
    <span class="sb-left"><span class="sb-dot"></span>실시간 · 지금 오픈된 포지션</span>
    <span class="sb-right">
      <span id="openPosBreakdown"></span>
      <span class="sb-count" id="openPosVal">—</span>
      <span>↗</span>
    </span>
  </a>

  <!-- 성과 스코어카드 -->
  <section class="sec" id="secScore" style="margin-top:24px">
    <div class="kpis kpis--5" id="scoreTiles"></div>
    <div id="scoreInsight" style="margin-top:12px;font-size:13px;color:var(--text-2);line-height:1.6"></div>
  </section>

  <!-- ① 인지 -->
  <section class="sec" id="secAwareness">
    <div class="sec-head"><span class="sec-no">01</span><span class="sec-title">인지</span><span class="sec-desc">채용 브랜딩이 자라고 있나</span></div>
    <div class="card pad">
      <div class="card-h"><div class="dot" style="background:var(--accent)"></div><span class="t">인지 성장 추세 — 노출 · 블로그 조회 · 팔로워</span></div>
      <div class="chart-box" id="awChartBox"><canvas id="awChart"></canvas></div>
      <div class="empty" id="awEmpty" style="display:none">이 기간에 데이터가 없습니다</div>
      <div class="acc" id="accAware">
        <button class="acc-btn" onclick="toggleAcc('accAware')"><span class="ar">▶</span> 채널별 주차 상세</button>
        <div class="acc-body" id="awDetail"></div>
      </div>
    </div>
  </section>

  <!-- ② 콘텐츠 기여 -->
  <section class="sec">
    <div class="sec-head"><span class="sec-no">02</span><span class="sec-title">콘텐츠 기여</span><span class="sec-desc">무엇이 먹혔나 → 다음 액션</span><span class="sec-pub" id="pubCount"></span></div>
    <div class="roi-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:14px">
      <div class="card pad">

        <table>

<script>
/* ════════ 1. DATA ════════ */
const UI_KEY='athome-recruit-ui-v2';
// __EXPORT_PLACEHOLDER_START__
// __EXPORT_PLACEHOLDER_END__
let __LAST_UPDATED__ = '—';

let DB={};
let range={mode:'4w',offset:0,start:null,end:null};
let charts={};

// 예전엔 GA4/LinkedIn/YouTube 실적을 파일에 그대로 구워서(__BAKED_DATA__) 로그인 여부와
// 무관하게 raw HTML만 열어도 노출됐다. 이제는 update.sh/linkedin_fetch.py/youtube_fetch.py가
// Firestore(dashboardWeekly/dashboardMeta)에 직접 쓰고, 여기서는 로그인한 사용자만 읽을 수
// 있는 그 Firestore 데이터를 읽어온다.
async function loadData(){
  // 수동 입력·파일 임포트 기능 제거됨(2026-07-06) — 데이터는 전부 API 자동수집(baked)
  // 과거 로컬 저장분은 청소만 (옛 스냅샷이 최신 데이터를 덮던 오염원)
  try{localStorage.removeItem('athome-recruit-v2');localStorage.removeItem('athome-recruit-manual-v3');}catch{}

  const db=window.__athomeDb__;
  const baked={};
  const snap=await db.collection('dashboardWeekly').get();
  snap.forEach(doc=>{baked[doc.id]=doc.data();});

  const summary=await db.collection('dashboardMeta').doc('summary').get();
  if(summary.exists){
    const s=summary.data();
    if(s.li_posts) baked['__li_posts__']=s.li_posts;
    if(s.yt_subscribers!==undefined) baked['__yt_subscribers__']=s.yt_subscribers;
    if(s.yt_videos) baked['__yt_videos__']=s.yt_videos;
    if(s.last_updated) __LAST_UPDATED__=s.last_updated;
  }

  DB={...baked};
}

/* ════════ 2. HELPERS ════════ */
const $=s=>document.querySelector(s);
const fmt=n=>(n==null||isNaN(n))?'0':Number(n).toLocaleString('ko-KR');
const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function sortedWeeks(){return Object.keys(DB).filter(k=>/^\d{4}-W\d{2}$/.test(k)&&k!==curWeek()).sort();}
function weekMonday(wid){const m=wid.match(/^(\d{4})-W(\d{2})$/);if(!m)return null;const y=+m[1],w=+m[2],jan4=new Date(Date.UTC(y,0,4)),d=jan4.getUTCDay()||7;return new Date(Date.UTC(y,0,4-d+1+(w-1)*7));}
function weekLabel(wid){const m=wid.match(/W(\d+)/);return m?'W'+(+m[1]):wid;}
function mdLabel(wid,end){const mon=weekMonday(wid);if(!mon)return'';const d=end?new Date(mon.getTime()+6*864e5):mon;return (d.getUTCMonth()+1)+'.'+d.getUTCDate();}
function dateToWeek(str){
  let d;
  if(/^\d{8}$/.test(str))d=new Date(`${str.slice(0,4)}-${str.slice(4,6)}-${str.slice(6,8)}`);
  else if(/^\d{2}\/\d{2}\/\d{4}$/.test(str)){const p=str.split('/');d=new Date(`${p[2]}-${p[0]}-${p[1]}`);}
  else d=new Date(str);
  if(!d||isNaN(d))return null;
  const t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const dn=t.getUTCDay()||7;t.setUTCDate(t.getUTCDate()+4-dn);
  const ys=new Date(Date.UTC(t.getUTCFullYear(),0,1));
  return `${t.getUTCFullYear()}-W${String(Math.ceil((((t-ys)/864e5)+1)/7)).padStart(2,'0')}`;
}
function curWeek(){return dateToWeek(new Date().toISOString().slice(0,10));}
const sum=(weeks,f)=>weeks.reduce((a,w)=>a+(DB[w]?.[f]||0),0);
function mom(cur,prev){if(prev==null)return null;const diff=cur-prev,pct=prev>0?diff/prev*100:null;return{diff,pct,dir:diff>0?'up':diff<0?'down':'flat'};}
function destroyChart(id){if(charts[id]){charts[id].destroy();delete charts[id];}}

/* ════════ 3. RANGE ════════ */
function computeRange(){
  const ws=sortedWeeks();
  if(!ws.length)return{weeks:[],prevWeeks:[],label:'데이터 없음'};
  let weeks;
  if(range.mode==='custom'&&range.start&&range.end){
    const a=dateToWeek(range.start),b=dateToWeek(range.end);
    weeks=ws.filter(w=>(!a||w>=a)&&(!b||w<=b)); if(!weeks.length)weeks=ws.slice(-4);
  }else{
    const n=range.mode==='all'?ws.length:range.mode==='12w'?12:range.mode==='8w'?8:range.mode==='1w'?1:4;
    const maxOff=Math.max(0,ws.length-n); range.offset=Math.min(Math.max(0,range.offset),maxOff);
    const end=ws.length-range.offset; weeks=ws.slice(Math.max(0,end-n),end);
  }
  const fi=ws.indexOf(weeks[0]);
  const prevWeeks=fi>0?ws.slice(Math.max(0,fi-weeks.length),fi):[];
  const label=weeks.length?`${mdLabel(weeks[0])} ~ ${mdLabel(weeks[weeks.length-1],true)} · ${weeks.length}주`:'데이터 없음';
  return{weeks,prevWeeks,label};
}
function saveUi(){try{localStorage.setItem(UI_KEY,JSON.stringify(range));}catch{}}
function restoreUi(){try{const s=JSON.parse(localStorage.getItem(UI_KEY)||'{}');if(s.mode)range.mode=s.mode;if(typeof s.offset==='number')range.offset=s.offset;if(s.start)range.start=s.start;if(s.end)range.end=s.end;
  if(s.start&&$('#cStart'))$('#cStart').value=s.start; if(s.end&&$('#cEnd'))$('#cEnd').value=s.end;}catch{}}
function setRange(m){range.mode=m;range.offset=0;if(m!=='custom'){range.start=range.end=null;}closeRange();saveUi();render();}
function applyCustom(){const s=$('#cStart').value,e=$('#cEnd').value;if(!s||!e)return alert('시작일과 종료일을 모두 선택하세요');if(s>e)return alert('시작일이 종료일보다 늦습니다');range.mode='custom';range.start=s;range.end=e;range.offset=0;closeRange();saveUi();render();}
// 월간 요약 — 이번 달(0)/지난 달(-1)을 custom 범위로 스냅
function setMonthRange(offset){
  const now=new Date();
  const first=new Date(now.getFullYear(),now.getMonth()+offset,1);
  const last=new Date(now.getFullYear(),now.getMonth()+offset+1,0);
  const f=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  range.mode='custom';range.start=f(first);range.end=f(last);range.offset=0;
  if($('#cStart'))$('#cStart').value=range.start;
  if($('#cEnd'))$('#cEnd').value=range.end;
  closeRange();saveUi();render();
}
function shiftRange(dir){if(range.mode==='all'||range.mode==='custom')return;const R=computeRange();range.offset-=dir*R.weeks.length;saveUi();render();}
function toggleRange(ev){ev.stopPropagation();closeMore();$('#rangeMenu').classList.toggle('open');}
function closeRange(){$('#rangeMenu').classList.remove('open');}
function toggleMore(ev){ev.stopPropagation();closeRange();$('#moreMenu').classList.toggle('open');}
function closeMore(){const m=$('#moreMenu');if(m)m.classList.remove('open');}
document.addEventListener('click',()=>{closeRange();closeMore();});
function toggleAcc(id){document.getElementById(id).classList.toggle('open');}

/* ════════ 4. RENDER ════════ */
const FONT="'Pretendard Variable',Pretendard,sans-serif";
const TICK={font:{family:FONT,size:11},color:'#A8A29A'};
const LEGEND={display:true,position:'top',align:'end',labels:{boxWidth:9,boxHeight:9,padding:12,font:{family:FONT,size:11},color:'#6B6660'}};
const TOOLTIP={backgroundColor:'#1A1A1A',titleFont:{family:FONT,size:12},bodyFont:{family:FONT,size:12}};

function render(){
  const R=computeRange();
  $('#rangeLabel').textContent=R.label;
  const ws=sortedWeeks();
  const fi=R.weeks.length?ws.indexOf(R.weeks[0]):0, li=R.weeks.length?ws.indexOf(R.weeks[R.weeks.length-1]):ws.length-1;
  const fixed=range.mode==='all'||range.mode==='custom';
  $('#prevBtn').disabled=fixed||fi<=0; $('#nextBtn').disabled=fixed||li>=ws.length-1;
  document.querySelectorAll('[data-range]').forEach(b=>b.classList.toggle('on',b.dataset.range===range.mode));
  renderScorecard(R); renderAwareness(R); renderContribution(R); renderConversion(R);
}

/* ── 공통 빌더 ── */
function spark(weeks,field){
  if(weeks.length<2)return'';
  const vals=weeks.map(w=>{const d=DB[w]||{};return typeof field==='function'?(field(d)||0):(d[field]||0);});
  const mx=Math.max(...vals),mn=Math.min(...vals),rg=mx-mn||1,W=54,H=24;
  const pts=vals.map((v,i)=>`${(i/(vals.length-1)*W).toFixed(1)},${(H-((v-mn)/rg)*(H-4)-2).toFixed(1)}`).join(' ');
  const c=vals[vals.length-1]>=vals[vals.length-2]?'#16A34A':'#DC2626';
  const ly=(H-((vals[vals.length-1]-mn)/rg)*(H-4)-2).toFixed(1);
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="opacity:.7;flex-shrink:0"><polyline points="${pts}" fill="none" stroke="${c}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><circle cx="${W}" cy="${ly}" r="2.4" fill="${c}"/></svg>`;
}
function badge(m){if(!m)return'';const a=m.dir==='up'?'▲':m.dir==='down'?'▼':'―';const p=m.pct!=null?` ${m.pct>=0?'+':''}${m.pct.toFixed(1)}%`:'';return `<span class="cmp ${m.dir}">${a}${p} vs 직전</span>`;}
function kpi(label,val,sub,cur,prev,sparkField,sparkWeeks){
  const m=mom(cur,prev),cls=m?m.dir:'';
  return `<div class="kpi ${cls}"><div class="kpi-top"><span class="kpi-label">${label}</span>${sparkField?spark(sparkWeeks,sparkField):''}</div><div class="kpi-val">${val}</div><div class="kpi-sub">${sub}</div>${badge(m)}</div>`;
}
function lastFollowers(weeks){
  if(!weeks.length)return 0;
  const inRange=weeks.filter(w=>DB[w]?.followers);
  if(inRange.length)return DB[inRange[inRange.length-1]].followers;
  // 범위 내 스냅샷 없으면 전체에서 가장 가까운 값(과거 우선, 없으면 미래) — 팔로워는 누적이라 빈칸 방지
  const all=sortedWeeks().filter(w=>DB[w]?.followers);
  if(!all.length)return 0;
  const last=weeks[weeks.length-1];
  const past=all.filter(w=>w<=last);
  return DB[past.length?past[past.length-1]:all[0]].followers;
}

/* ── 성과 스코어카드 ── */
function renderScorecard(R){
  const {weeks,prevWeeks}=R;
  const spk=sortedWeeks().slice(-8);
  const pw=prevWeeks;

  // 팔로워
  const curF=lastFollowers(weeks);
  const prevF=pw.length?(lastFollowers(pw)||null):null;
  const net=sum(weeks,'newFollowers');

  // 노출
  const curImp=sum(weeks,'impressions');
  const prevImp=pw.length?sum(pw,'impressions'):null;

  // 방문
  const curUsr=sum(weeks,'users');
  const prevUsr=pw.length?sum(pw,'users'):null;

  // 블로그 조회
  const curBlog=sum(weeks,'blog_pageviews');
  const prevBlog=pw.length?sum(pw,'blog_pageviews'):null;

  // 평균 참여 시간
  const curBlogUsr=sum(weeks,'blog_users');
  const prevBlogUsr=pw.length?sum(pw,'blog_users'):0;
  const curAvg=curBlogUsr?sum(weeks,'blog_engTime')/curBlogUsr:0;
  const prevAvg=(pw.length&&prevBlogUsr)?sum(pw,'blog_engTime')/prevBlogUsr:null;
  const avgMin=Math.floor(curAvg/60);
  const avgSec=String(Math.round(curAvg%60)).padStart(2,'0');

  $('#scoreTiles').innerHTML=[
    kpi('LinkedIn 팔로워',fmt(curF),`기간 순증 ${net>=0?'+':''}${fmt(net)}명`,curF,prevF,'followers',spk),
    kpi('LinkedIn 노출',fmt(curImp),'기간 합계',curImp,prevImp,'impressions',spk),
    kpi('채용페이지 방문',fmt(curUsr),'기간 합계',curUsr,prevUsr,'users',spk),
    kpi('블로그 조회',fmt(curBlog),'기간 합계',curBlog,prevBlog,'blog_pageviews',spk),
    kpi('평균 참여 시간',curBlogUsr?`${avgMin}:${avgSec}`:'—','분:초',curAvg,prevAvg,d=>d.blog_users?d.blog_engTime/d.blog_users:0,spk),
  ].join('');

  // 핵심 변화 인사이트
  const metrics=[
    {name:'팔로워',cur:curF,prev:prevF},
    {name:'노출',cur:curImp,prev:prevImp},
    {name:'방문',cur:curUsr,prev:prevUsr},
    {name:'블로그 조회',cur:curBlog,prev:prevBlog},
    {name:'평균 참여',cur:curAvg,prev:prevAvg},
  ];
  const changes=metrics
    .map(m=>{const mo=mom(m.cur,m.prev);return mo&&mo.pct!=null?{name:m.name,mo}:null;})
    .filter(Boolean)
    .sort((a,b)=>Math.abs(b.mo.pct)-Math.abs(a.mo.pct))
    .slice(0,2);

  let insight;
  if(!changes.length){
    insight='데이터가 쌓이면 핵심 변화가 표시됩니다.';
  }else{
    const parts=changes.map(c=>{
      const arrow=c.mo.dir==='up'?'▲':'▼';
      const sign=c.mo.pct>=0?'+':'';
      return `<strong>${c.name}</strong> ${arrow} ${sign}${c.mo.pct.toFixed(1)}%`;
    });
    insight='이번 기간 핵심 변화 — '+parts.join(' · ');
  }
  $('#scoreInsight').innerHTML=insight;
}

/* ── ① 인지 ── */
function renderAwareness(R){
  const {weeks}=R;

  destroyChart('aw');
  const box=$('#awChartBox'),empty=$('#awEmpty');
  if(!weeks.length){box.style.display='none';empty.style.display='';}
  else{
    box.style.display='';empty.style.display='none';
    const ann={};const cal=DB['__calendar__'];
    if(cal){
      // 같은 주차에 여러 건이 발행되면 라벨이 한 자리에 겹치므로 주차별로 묶어 1개만 표기
      const byIdx={};
      cal.forEach(e=>{if(!e.date)return;const wk=dateToWeek(e.date);if(!weeks.includes(wk))return;const idx=weeks.indexOf(wk);if(idx<0)return;(byIdx[idx]||(byIdx[idx]=[])).push(e);});
      Object.entries(byIdx).forEach(([idx,items])=>{const n=items.length;const content=n===1?items[0].title.slice(0,11):`${n}건 발행`;ann['c'+idx]={type:'line',xMin:+idx,xMax:+idx,borderColor:'rgba(0,0,0,.10)',borderWidth:1,borderDash:[4,3],label:{display:true,content,position:'start',font:{size:9,family:FONT},color:'#A8A29A',backgroundColor:'transparent'}};});
    }
    charts.aw=new Chart($('#awChart'),{
      data:{labels:weeks.map(weekLabel),datasets:[
        {type:'bar',label:'LinkedIn 노출',data:weeks.map(w=>DB[w]?.impressions||0),backgroundColor:'rgba(74,69,64,.15)',borderRadius:4,yAxisID:'y',order:3},
        {type:'line',label:'블로그 조회',data:weeks.map(w=>DB[w]?.blog_pageviews||0),borderColor:'#9A958C',borderWidth:1.8,pointRadius:2.5,tension:.3,yAxisID:'y',order:2},
        {type:'line',label:'팔로워(누적)',data:weeks.map(w=>DB[w]?.followers||null),borderColor:'#FF5D00',borderWidth:2.4,pointRadius:3,tension:.3,spanGaps:true,yAxisID:'y1',order:1},
      ]},
      options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:LEGEND,tooltip:{...TOOLTIP,callbacks:{title:(it)=>{const w=weeks[it[0].dataIndex];return w?`${weekLabel(w)} · ${mdLabel(w)}~${mdLabel(w,true)}`:'';}}},annotation:{annotations:ann}},
        scales:{x:{grid:{color:'#F1F0ED'},ticks:TICK},y:{position:'left',grid:{color:'#F1F0ED'},ticks:{...TICK,callback:v=>fmt(v)}},y1:{position:'right',grid:{drawOnChartArea:false},ticks:{...TICK,callback:v=>fmt(v)}}}}
    });
  }
  // 아코디언: 채널 주차 테이블
  if($('#accAware').classList.contains('open')||$('#awDetail').innerHTML==='')renderAwareDetail(weeks);
  else renderAwareDetail(weeks);
}
function renderAwareDetail(weeks){
  const rows=w=>{const d=DB[w]||{};const rx=(d.likes||0)+(d.comments||0)+(d.shares||0);return `<tr><td><span class="wbadge">${weekLabel(w)}</span></td><td style="text-align:right">${fmt(d.impressions||0)}</td><td style="text-align:right">${fmt(rx)}</td><td style="text-align:right">${fmt(d.users||0)}</td><td style="text-align:right">${fmt(d.apply_pv||0)}</td><td style="text-align:right">${fmt(d.blog_pageviews||0)}</td></tr>`;};
  $('#awDetail').innerHTML=weeks.length?`<table><thead><tr><th>주차</th><th style="text-align:right">LI노출</th><th style="text-align:right">LI반응</th><th style="text-align:right">방문</th><th style="text-align:right">지원도달</th><th style="text-align:right">블로그</th></tr></thead><tbody>${weeks.map(rows).join('')}</tbody></table>`:'<div class="empty">데이터 없음</div>';
}

/* 메인·카테고리 등 내비게이션 페이지 제외 (실제 글만 랭킹) */
const NAV_TITLES=['앳홈 블로그','People','Culture','Works','Home','Now'];
function isNavPage(p){
  const t=String(p.title||'').replace(/\s*[-–]\s*앳홈 블로그\s*$/,'').trim();
  if(!t||NAV_TITLES.includes(t))return true;
  if(/\/category|^\/$/.test(p.path||'')&&NAV_TITLES.includes(t))return true;
  if((p.path||'').includes('/category'))return true;
  return false;
}

/* ── ② 콘텐츠 기여 ── */
function renderContribution(R){
  const {weeks}=R;
  // 발행 수 컨텍스트 라벨
  const pubEl=$('#pubCount');
  if(pubEl){
    const cal=DB['__calendar__']||[];
    const weekSet=new Set(weeks);
    const calCur=cal.filter(e=>e.date&&weekSet.has(dateToWeek(e.date)));
    const curPub=calCur.length;
    const liN=calCur.filter(e=>e.channel==='linkedin').length;
    const blN=calCur.filter(e=>e.channel==='blog'||e.channel==='블로그').length;
    const ptN=calCur.filter(e=>e.channel==='podcast').length;
    pubEl.innerHTML=curPub?`이번 기간 발행 ${curPub}건 · LI ${liN} · Blog ${blN} · 팟캐스트 ${ptN}`:'이번 기간 발행 없음';
  }
  // 게시물 성과: Blog/LinkedIn 2카드 (통합 랭킹과 중복되어 통합 랭킹 제거)
  renderRoi(weeks);
}
function engStr(sec,pv){if(!pv||!sec)return'—';const a=Math.round(sec/pv),m=Math.floor(a/60),s=a%60;return `${m}:${String(s).padStart(2,'0')}`;}
function renderRoi(weeks){
  // 캘린더 제목 매칭(매칭률 0) 대신 실제 성과 데이터를 직접 사용 — 랭킹과 동일 소스, 채널별 2카드
  // ── Blog: blog_posts를 제목별 집계 (같은 글이 /slug·/ 두 경로로 잡히는 중복 병합), 조회수 상위 ──
  const bmap={};
  const normT=t=>String(t||'').replace(/\s*[-–]\s*앳홈 블로그\s*$/,'').trim();
  weeks.forEach(w=>(DB[w]?.blog_posts||[]).forEach(p=>{if(isNavPage(p))return;const title=normT(p.title);const k=title.toLowerCase()||p.path;if(!k)return;if(!bmap[k])bmap[k]={title:title||p.path,pv:0,eng:0};bmap[k].pv+=p.pageviews||0;bmap[k].eng+=p.engTime||0;}));
  const blog=Object.values(bmap).sort((a,b)=>(b.pv||0)-(a.pv||0));
  $('#roiBlogSub').textContent=blog.length?`${blog.length}개 중 상위 ${Math.min(8,blog.length)}`:'';
  $('#roiBlogBody').innerHTML=blog.length
    ?blog.slice(0,8).map(b=>`<tr><td style="font-weight:600" class="ell" title="${esc(b.title)}">${esc(b.title)}</td><td style="text-align:right;font-weight:700">${fmt(b.pv)}</td><td style="text-align:right;color:var(--text-3)">${engStr(b.eng,b.pv)}</td></tr>`).join('')
    :'<tr><td colspan="3" class="empty">이 기간 블로그 게시물 데이터 없음</td></tr>';
  // ── LinkedIn: 게시물별 노출 상위 (전체 게시물 XLS 우선, 없으면 주차 posts) ──
  const lrows=[];
  const li=DB['__li_posts__'];
  if(li&&li.length)li.filter(p=>weeks.includes(dateToWeek(p.date))).forEach(p=>lrows.push({title:p.title,imp:p.impressions||0,sub:`${fmt(p.reactions||0)} 반응`}));
  else weeks.forEach(w=>(DB[w]?.posts||[]).forEach(p=>lrows.push({title:p.title,imp:p.impressions||0,sub:`${fmt((p.likes||0)+(p.comments||0)+(p.shares||0))} 반응`})));
  lrows.sort((a,b)=>(b.imp||0)-(a.imp||0));
  $('#roiLiSub').textContent=lrows.length?`${lrows.length}개 중 상위 ${Math.min(8,lrows.length)}`:'';
  $('#roiLiBody').innerHTML=lrows.length
    ?lrows.slice(0,8).map(r=>`<tr><td style="font-weight:600" class="ell" title="${esc(r.title)}">${esc(r.title)}</td><td style="text-align:right;font-weight:700">${fmt(r.imp)}</td><td style="text-align:right;color:var(--text-3)">${r.sub}</td></tr>`).join('')
    :'<tr><td colspan="3" class="empty">이 기간 LinkedIn 게시물 데이터 없음 — 전체 게시물 XLS 업로드 필요</td></tr>';
  // ── 팟캐스트(홈레코딩): 영상 적고 누적 조회라 기간 필터 없이 전체 시리즈 조회순 ──
  const yt=DB['__yt_videos__']||[], subs=DB['__yt_subscribers__'];
  // 주차별 스냅샷(yt_views/yt_likes/yt_subs)이 2개 이상 쌓이면 최근 두 스냅샷 간 증감 표시
  const ytWeeks=Object.keys(DB).filter(k=>/^\d{4}-W\d{2}$/.test(k)&&DB[k].yt_views!=null).sort();
  let ytDelta='';
  if(ytWeeks.length>=2){
    const a=DB[ytWeeks[ytWeeks.length-2]],b=DB[ytWeeks[ytWeeks.length-1]];
    const dv=b.yt_views-a.yt_views,ds=(b.yt_subs||0)-(a.yt_subs||0);
    ytDelta=` · 주간 조회 ${dv>=0?'+':''}${fmt(dv)}${ds?` · 구독 ${ds>0?'+':''}${fmt(ds)}`:''}`;
  }
  if($('#roiYtSub'))$('#roiYtSub').textContent=subs?`구독자 ${fmt(subs)}${ytDelta||' · 전체 시리즈'}`:'';
  if($('#roiYtBody'))$('#roiYtBody').innerHTML=yt.length
    ?yt.slice(0,8).map(v=>`<tr><td style="font-weight:600" class="ell" title="${esc(v.title)}">${esc(v.title)}</td><td style="text-align:right;font-weight:700">${fmt(v.views)}</td><td style="text-align:right;color:var(--text-3)">${fmt(v.likes)}·${fmt(v.comments)}</td></tr>`).join('')
    :'<tr><td colspan="3" class="empty">홈레코딩 영상 데이터 없음</td></tr>';
}

/* ── ③ 전환·품질 ── */
function renderConversion(R){
  const {weeks}=R;
  // 유입 품질
  const curPV=sum(weeks,'blog_pageviews');
  const pw=R.prevWeeks;
  const curUsr=sum(weeks,'blog_users'),prevUsr=pw.length?sum(pw,'blog_users'):0;
  const curAvg=curUsr?sum(weeks,'blog_engTime')/curUsr:0;
  const prevAvg=(pw.length&&prevUsr)?sum(pw,'blog_engTime')/prevUsr:null;
  const m=Math.floor(curAvg/60),s=Math.round(curAvg%60);
  const curU=sum(weeks,'users'),curN=sum(weeks,'newUsers'),nr=curU?((curN/curU)*100).toFixed(0):'—';
  $('#quality').innerHTML=`<div style="display:flex;align-items:flex-end;gap:9px;margin-bottom:4px"><div class="q-big">${curPV?`${m}:${String(s).padStart(2,'0')}`:'—'}</div><div style="font-size:12px;color:var(--text-4);padding-bottom:5px">평균 체류 (분:초)</div></div><div style="margin-bottom:13px">${badge(mom(curAvg,prevAvg))}</div><div style="font-size:12px;color:var(--text-3);line-height:1.7"><div>· 블로그 조회 <b>${fmt(curPV)}</b> · 순방문 <b>${fmt(sum(weeks,'blog_users'))}</b></div><div>· 채용페이지 신규 방문 비율 <b>${nr}%</b></div><div style="color:var(--text-4);margin-top:8px">체류가 길수록 '콘텐츠 보고 들어온 결 맞는 트래픽'</div></div>`;

  // 유입 출처 — 선택 기간(weeks) 합산. 주차별 sources 없으면 전체누적(__sources__)로 폴백
  destroyChart('src');
  const legend=$('#srcLegend');
  const srcMap={};
  weeks.forEach(w=>{(DB[w]&&DB[w].sources||[]).forEach(x=>{
    const k=(x.source||'')+'␀'+(x.medium||'');
    if(!srcMap[k])srcMap[k]={source:x.source,medium:x.medium,users:0,sessions:0};
    srcMap[k].users+=x.users||0; srcMap[k].sessions+=x.sessions||0;
  });});
  let sources=Object.values(srcMap).sort((a,b)=>b.users-a.users);
  let srcScope='선택 기간';
  if(!sources.length){ sources=DB['__sources__']||[]; srcScope='전체 기간'; }
  const srcSub=$('#srcSub'); if(srcSub) srcSub.textContent='채용 페이지 · '+srcScope;
  if(!sources||!sources.length){legend.innerHTML='<div style="color:var(--text-4);font-size:12px">유입 출처 없음</div>';$('#srcDetail').innerHTML='';}
  else{
    const top5=sources.slice(0,5),tot=sources.reduce((a,x)=>a+x.users,0)||1,cols=['#4A4540','#6B6660','#8A857D','#B5AFA6','#D2CCC3'];
    charts.src=new Chart($('#srcChart'),{type:'doughnut',data:{labels:top5.map(s=>`${s.source}/${s.medium}`),datasets:[{data:top5.map(s=>s.users),backgroundColor:cols,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:true,cutout:'64%',plugins:{legend:{display:false},tooltip:TOOLTIP}}});
    legend.innerHTML=top5.map((s,i)=>`<div class="dough-row"><div style="display:flex;align-items:center;gap:6px;min-width:0"><div class="ldot" style="background:${cols[i]}"></div><span class="ell" style="max-width:150px">${esc(s.source)}/${esc(s.medium)}</span></div><div style="font-weight:700;white-space:nowrap">${fmt(s.users)} <span style="color:var(--text-4);font-weight:400">${(s.users/tot*100).toFixed(1)}%</span></div></div>`).join('');
    $('#srcDetail').innerHTML=`<table><thead><tr><th>출처/매체</th><th style="text-align:right">방문자</th><th style="text-align:right">세션</th></tr></thead><tbody>${sources.map(s=>`<tr><td class="ell">${esc(s.source)}/${esc(s.medium)}</td><td style="text-align:right">${fmt(s.users)}</td><td style="text-align:right">${fmt(s.sessions)}</td></tr>`).join('')}</tbody></table>`;
  }
}

/* ════════ 5. UI HELPERS ════════ */
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2400);}

/* ════════ 6. EXPORT ════════ */
function exportWithData(){
  const src=document.documentElement.outerHTML;
  const injected=src.replace(/\/\/ __EXPORT_PLACEHOLDER_START__[\s\S]*?\/\/ __EXPORT_PLACEHOLDER_END__/,`// __EXPORT_PLACEHOLDER_START__\nconst __BAKED_DATA__ = ${JSON.stringify(DB)};\n// __EXPORT_PLACEHOLDER_END__`);
  const blob=new Blob([injected],{type:'text/html;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  const d=new Date();a.download=`athome-dashboard-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.html`;
  a.click();URL.revokeObjectURL(a.href);
}

/* ════════ 8. SOURCE SYNC ════════ */
// 콘텐츠 캘린더는 원래 공개 CSV export URL을 직접 열었는데(캘린더 탭도 같은 시트를 또
// 독립적으로 fetch — 중복 네트워크 요청), 이제 calendar_sync.py가 이미 Firestore에
// 동기화해둔 calendarEvents 컬렉션을 캘린더 탭과 함께 읽는다.
function normChannel(ch){const s=(ch||'').trim().toLowerCase();if(s.includes('링크드')||s==='linkedin')return'linkedin';if(s.includes('블로그')||s==='blog')return'blog';if(s.includes('채용')||s.includes('recruit'))return'recruit';if(s.includes('팟캐스트')||s.includes('홈레코딩')||s==='podcast')return'podcast';return s||'other';}
async function syncCalendar(){try{const db=window.__athomeDb__;const snap=await db.collection('calendarEvents').get();const ev=snap.docs.map(doc=>{const d=doc.data();return{date:(d.date||'').trim(),title:(d.title||'').trim(),channel:normChannel(d.channel),url:(d.url||'').trim()};}).filter(e=>e.date&&e.title);if(ev.length){DB['__calendar__']=ev;render();}}catch(e){console.warn('[calendar] sync skip');}}

// career.athomecorp.com 오픈 포지션 실시간 미러링 (ninehire 공개 API, baked 데이터와 무관하게 매 방문 시 조회)
async function syncOpenPositions(){
  const valEl=$('#openPosVal'),bdEl=$('#openPosBreakdown');
  try{
    const res=await fetch('https://api.ninehire.com/identity-access/homepage/recruitments?companyId=f6b69a00-168c-11f0-8d01-3f2475e76c63&page=1&countPerPage=100',{cache:'no-store'});
    if(!res.ok)throw 0;
    const {count,results}=await res.json();
    valEl.textContent=`${fmt(count)}건`;
    const byGroup={};
    (results||[]).forEach(r=>{const g=r.jobGroup?.title||'기타';byGroup[g]=(byGroup[g]||0)+1;});
    const top=Object.entries(byGroup).sort((a,b)=>b[1]-a[1]).slice(0,4);
    bdEl.textContent=top.map(([g,n])=>`${g} ${n}`).join(' · ');
  }catch(e){
    valEl.textContent='—';
    bdEl.textContent='실시간 조회 실패';
    console.warn('[openPositions] sync skip', e);
  }
}

/* ════════ 9. STALE ════════ */
// LinkedIn refresh 토큰 만료일 — linkedin_oauth.py로 재발급하면 이 날짜도 함께 갱신할 것
const __LI_TOKEN_EXPIRES__="2026-08-21";
function checkStale(){
  const msgs=[];
  if(__LAST_UPDATED__&&__LAST_UPDATED__!=='—'){
    const p=__LAST_UPDATED__.match(/(\d{4})년\s*(\d{1,2})월\s*(\d{1,2})일/);
    if(p){const diff=Math.floor((Date.now()-new Date(+p[1],+p[2]-1,+p[3]))/864e5);
      if(diff>=7)msgs.push(`데이터가 ${diff}일 전 업데이트되었습니다. update.sh 실행을 권장합니다.`);}
  }
  if(__LI_TOKEN_EXPIRES__){
    const dLeft=Math.ceil((new Date(__LI_TOKEN_EXPIRES__)-Date.now())/864e5);
    if(dLeft<0)msgs.push('🔑 LinkedIn 토큰이 만료됐습니다 — LinkedIn 수집이 중단된 상태입니다. linkedin_oauth.py로 재발급하세요.');
    else if(dLeft<=14)msgs.push(`🔑 LinkedIn 토큰 만료 D-${dLeft} (${__LI_TOKEN_EXPIRES__}) — linkedin_oauth.py 재발급 후 GitHub Secret 갱신 필요`);
  }
  if(msgs.length){const el=$('#stale');el.textContent=msgs.join('  ·  ');el.style.display='block';}
}

/* ════════ 10. INIT ════════ */
// Firestore(dashboardWeekly 등)는 로그인한 사용자만 읽을 수 있도록 보안 규칙이 걸려있어,
// 로그인이 끝나기 전에 읽으면 항상 permission-denied로 실패한다 — auth.js가 로그인 완료를
// 알리는 시점(또는 이미 로그인된 상태로 들어온 경우)까지 기다린다.
async function initDashboard(){
  await loadData();
  restoreUi();
  checkStale();
  if($('#lastUpd')&&__LAST_UPDATED__&&__LAST_UPDATED__!=='—'){const el=$('#lastUpd');const m=__LAST_UPDATED__.match(/(\d+)월\s*(\d+)일(?:\s*([\d:]+))?/);el.textContent=m?`⟳ ${m[1]}/${m[2]}${m[3]?' '+m[3]:''}`:'⟳ '+__LAST_UPDATED__;el.title='최근 업데이트 '+__LAST_UPDATED__;}
  render();
  syncCalendar();
}
if(window.__athomeUser__) initDashboard();
document.addEventListener('athome-auth-ready', initDashboard);
syncOpenPositions(); // 회사 계정 로그인과 무관한 외부 채용 플랫폼 공개 API라 바로 실행

// 잘린 제목 호버 → 즉시 전문 툴팁 (기본 title은 hover 동안 제거해 중복 방지)
(function(){
  const grid=document.querySelector('.roi-grid');if(!grid)return;
  let tip=document.getElementById('roiTip');
  if(!tip){tip=document.createElement('div');tip.id='roiTip';tip.className='roi-tip';document.body.appendChild(tip);}
  grid.addEventListener('mouseover',e=>{const td=e.target.closest('td.ell');if(!td)return;const full=td.getAttribute('title')||td.textContent.trim();if(!full)return;td._full=td.getAttribute('title');td.removeAttribute('title');tip.textContent=full;tip.style.display='block';});
  grid.addEventListener('mousemove',e=>{if(tip.style.display!=='block')return;let x=e.clientX+14,y=e.clientY+16;if(x+tip.offsetWidth>innerWidth-8)x=innerWidth-tip.offsetWidth-8;tip.style.left=x+'px';tip.style.top=y+'px';});
  grid.addEventListener('mouseout',e=>{const td=e.target.closest('td.ell');if(td&&td._full)td.setAttribute('title',td._full);tip.style.display='none';});
})();
</script>
