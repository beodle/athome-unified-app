<!doctype html>
<html lang="ko">
<head>
  <script src="./auth.js"></script>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <title>ATHOME 채용 콘텐츠 워크스페이스</title>
  <link rel="stylesheet" href="./athome-tokens.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%231A1A1A'/><rect x='16' y='58' width='16' height='28' rx='4' fill='%23FF5D00'/><rect x='42' y='38' width='16' height='48' rx='4' fill='%23FF5D00'/><rect x='68' y='18' width='16' height='68' rx='4' fill='%23FF5D00'/></svg>">
  <style>
    :root {
      --shell-accent: #FF5D00;
      --shell-accent-soft: rgba(255, 93, 0, .08);
      --shell-accent-mid: rgba(255, 93, 0, .16);
      --shell-ink: #1A1714;
      --shell-text-2: #4A4540;
      --shell-muted: #6B6660;
      --shell-faint: #A8A29A;
      --shell-line: #ECEAE5;
      --shell-line-2: #DAD6CF;
      --shell-page: #F5F4F1;
      --shell-panel: #FFFFFF;
      --shell-soft: #F0EEE9;
      --shell-gray: #E9E6E0;
      --shell-shadow: 0 1px 2px rgba(40, 30, 20, .03), 0 3px 14px rgba(40, 30, 20, .035);
      --shell-font: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      background: var(--shell-page);
      color: var(--shell-ink);
      font-family: var(--shell-font);
      -webkit-font-smoothing: antialiased;
      letter-spacing: 0;
    }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: 58px 1fr;
      background: var(--shell-page);
    }

    .shell-header {
      position: sticky;
      top: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 24px;
      border-bottom: 1px solid var(--shell-line);
      background: rgba(245, 244, 241, .86);
      backdrop-filter: saturate(180%) blur(10px);
      -webkit-backdrop-filter: saturate(180%) blur(10px);
    }

    .shell-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 196px;
      color: var(--shell-ink);
      text-decoration: none;
    }

    .brand-mark {
      width: 26px;
      height: 26px;
      border-radius: 7px;
      background: #1A1A1A;
      display: grid;
      grid-template-columns: repeat(3, 4px);
      align-items: end;
      justify-content: center;
      gap: 4px;
      padding: 6px;
      box-shadow: 0 1px 2px rgba(40, 30, 20, .08);
    }
    .brand-mark span { display: block; width: 4px; border-radius: 3px; background: var(--shell-accent); }
    .brand-mark span:nth-child(1) { height: 10px; }
    .brand-mark span:nth-child(2) { height: 15px; }
    .brand-mark span:nth-child(3) { height: 20px; }

    .shell-quicklinks {
      display: flex;
      align-items: center;
      gap: 3px;
      margin-left: 6px;
      padding-left: 10px;
      border-left: 1px solid var(--shell-line-2);
    }
    .shell-quicklinks button {
      position: relative;
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border: 1px solid transparent;
      border-radius: 7px;
      background: none;
      font-size: 14px;
      line-height: 1;
      cursor: pointer;
      transition: background .15s, border-color .15s;
    }
    .shell-quicklinks button:hover {
      background: var(--shell-panel);
      border-color: var(--shell-line);
    }
    .shell-quicklinks button::after {
      content: attr(data-tip);
      position: absolute;
      top: calc(100% + 7px);
      right: 0;
      background: var(--shell-ink);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      line-height: 1;
      padding: 5px 8px;
      border-radius: 6px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-3px);
      transition: opacity .12s, transform .12s;
      z-index: 10;
    }
    .shell-quicklinks button:hover::after {
      opacity: 1;
      transform: translateY(0);
    }

    .brand-text {
      display: flex;
      align-items: baseline;
      gap: 8px;
      white-space: nowrap;
    }
    .brand-text strong { font-size: 15px; font-weight: 800; letter-spacing: -.02em; }
    .brand-text em { font-style: normal; font-size: 13px; font-weight: 700; color: var(--shell-muted); }

    .shell-title {
      flex: 1;
      min-width: 0;
      font-size: 13px;
      font-weight: 700;
      color: var(--shell-faint);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* 캘린더 전용 헤더 액션 */
    .cal-header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .cal-header-actions[hidden] { display: none; }

    .shell-add {
      border: 0;
      border-radius: 9px;
      padding: 8px 12px;
      background: var(--shell-accent);
      color: #fff;
      font: 800 12.5px/1 var(--shell-font);
      cursor: pointer;
      transition: opacity .15s;
    }
    .shell-add:hover { opacity: .9; }
    .shell-add[hidden] { display: none; }

    .shell-login {
      border: 1px solid var(--shell-line);
      border-radius: 9px;
      padding: 7px 12px;
      background: var(--shell-panel);
      color: var(--shell-muted);
      font: 800 12.5px/1 var(--shell-font);
      cursor: pointer;
      transition: color .15s, border-color .15s, background .15s;
    }
    .shell-login:hover { color: var(--shell-ink); border-color: var(--shell-faint); }
    .shell-login.authenticated {
      background: #059669;
      border-color: #059669;
      color: #fff;
    }
    .shell-login[hidden] { display: none; }

    .shell-sheet-link {
      font-size: 12px;
      font-weight: 600;
      color: var(--shell-faint);
      text-decoration: none;
      letter-spacing: 0.02em;
      padding: 7px 10px;
      border-radius: 8px;
      transition: color .15s, background .15s;
    }
    .shell-sheet-link:hover { color: var(--shell-ink); background: var(--shell-soft); }

    .shell-refresh {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border: 1px solid var(--shell-line);
      border-radius: 8px;
      background: var(--shell-panel);
      color: var(--shell-muted);
      font-size: 15px;
      cursor: pointer;
      transition: color .15s, border-color .15s, background .15s;
    }
    .shell-refresh:hover { color: var(--shell-ink); border-color: var(--shell-faint); }
    .shell-refresh:disabled { opacity: .45; cursor: not-allowed; }

    .shell-main {
      display: grid;
      grid-template-columns: 212px minmax(0, 1fr);
      min-height: 0;
    }

    .shell-sidebar {
      position: sticky;
      top: 58px;
      align-self: start;
      height: calc(100vh - 58px);
      padding: 22px 14px;
      background: rgba(245, 244, 241, .96);
      color: var(--shell-ink);
      border-right: 1px solid var(--shell-line);
      display: flex;
      flex-direction: column;
    }

    .auth-widget {
      margin-top: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 10px;
      border-top: 1px solid var(--shell-line);
    }
    .auth-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22C55E;
      box-shadow: 0 0 0 3px rgba(34, 197, 94, .18);
      flex-shrink: 0;
    }
    .auth-email {
      flex: 1;
      min-width: 0;
      font-size: 11.5px;
      font-weight: 700;
      color: var(--shell-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .auth-logout {
      border: 1px solid var(--shell-line);
      background: var(--shell-panel);
      color: var(--shell-muted);
      border-radius: 7px;
      padding: 5px 9px;
      font: 700 11px/1 var(--shell-font);
      cursor: pointer;
      flex-shrink: 0;
      transition: color .15s, border-color .15s;
    }
    .auth-logout:hover { color: var(--shell-ink); border-color: var(--shell-faint); }

    .side-label {
      margin: 0 10px 9px;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .08em;
      color: var(--shell-faint);
      text-transform: uppercase;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 40px;
      margin-bottom: 6px;
      padding: 0 10px;
      border: 1px solid transparent;
      border-radius: 9px;
      color: var(--shell-muted);
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
      transition: color .15s, background .15s, border-color .15s, box-shadow .15s;
    }
    .nav-link:hover {
      color: var(--shell-ink);
      background: var(--shell-soft);
      border-color: var(--shell-line);
    }
    .nav-link.active {
      color: var(--shell-ink);
      background: var(--shell-panel);
      border-color: var(--shell-line);
      box-shadow: var(--shell-shadow);
    }
    .nav-link.active .nav-icon {
      color: var(--shell-accent);
      background: var(--shell-accent-soft);
    }
    .nav-icon {
      width: 22px;
      height: 22px;
      border-radius: 7px;
      display: grid;
      place-items: center;
      color: var(--shell-faint);
      font-size: 12px;
      line-height: 1;
      background: transparent;
    }

    .view-shell {
      min-width: 0;
      overflow: clip;
      background: var(--shell-page);
    }

    #view-container { min-height: calc(100vh - 58px); }

    .view-frame {
      display: block;
      width: 100%;
      height: calc(100vh - 58px);
      border: 0;
      background: var(--shell-page);
    }

    .view-loading,
    .view-error {
      min-height: calc(100vh - 58px);
      display: grid;
      place-items: center;
      padding: 40px;
      color: var(--shell-muted);
      font-size: 13px;
      font-weight: 800;
    }

    .view-error {
      color: #B42318;
      background: #FFF7F5;
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="shell-header">
      <a class="shell-brand" href="#/dashboard" aria-label="ATHOME 채용 콘텐츠 워크스페이스">
        <img src="https://raw.githubusercontent.com/beodle/athome-assets/main/ATHOME_CI_screen.svg"
             alt="ATHOME" style="height:18px;width:auto;display:block;">
        <span class="brand-text"><em>채용 콘텐츠 워크스페이스</em></span>
      </a>
      <div class="shell-title" id="shell-title">대시보드</div>
      <!-- 캘린더 전용 액션 (캘린더 뷰에서만 노출) -->
      <div class="cal-header-actions" id="cal-header-actions" hidden>
        <button class="shell-add" id="shell-add" type="button" hidden>＋ 일정 추가</button>
        <button class="shell-login" id="shell-login" type="button">✎ 편집 로그인</button>
        <a class="shell-sheet-link" id="shell-sheet-link"
           href="https://docs.google.com/spreadsheets/d/1bnLQypIuMb0gw0RxzwYVkqGBdN8KSA4_TXSuogaOWak/edit?gid=658998951#gid=658998951"
           target="_blank">시트 열기 ↗</a>
        <button class="shell-refresh" id="shell-refresh" title="캘린더 새로고침">↻</button>
      </div>
      <div class="shell-quicklinks">
        <button type="button" onclick="window.open('https://blog.athomecorp.com/','_blank')" data-tip="블로그" aria-label="블로그">📝</button>
        <button type="button" onclick="window.open('https://www.linkedin.com/company/90478773/','_blank')" data-tip="링크드인" aria-label="링크드인">💼</button>
        <button type="button" onclick="window.open('https://www.youtube.com/channel/UCfRWcGQK-952YXBIaHFcsNA','_blank')" data-tip="유튜브 채널" aria-label="유튜브 채널">▶️</button>
        <button type="button" onclick="window.open('https://career.athomecorp.com/','_blank')" data-tip="채용사이트" aria-label="채용사이트">🏢</button>
      </div>
    </header>

    <main class="shell-main">
      <aside class="shell-sidebar" aria-label="앳홈 채용 인프라 메뉴">
        <p class="side-label">Workspace</p>
        <a class="nav-link" data-route="dashboard" href="#/dashboard">
          <span class="nav-icon" aria-hidden="true">▦</span>
          <span>대시보드</span>
        </a>
        <a class="nav-link" data-route="calendar" href="#/calendar">
          <span class="nav-icon" aria-hidden="true">◷</span>
          <span>콘텐츠 캘린더</span>
        </a>
        <a class="nav-link" data-route="utm" href="#/utm">
          <span class="nav-icon" aria-hidden="true">⛓</span>
          <span>UTM 빌더</span>
        </a>
        <a class="nav-link" data-route="cardnews" href="#/cardnews">
          <span class="nav-icon" aria-hidden="true">▨</span>
          <span>카드뉴스 에디터</span>
        </a>
        <a class="nav-link" data-route="ideas" href="#/ideas">
          <span class="nav-icon" aria-hidden="true">📌</span>
          <span>아이디어 노트</span>
        </a>
        <div class="auth-widget" id="auth-widget" hidden>
          <span class="auth-dot"></span>
          <span class="auth-email" id="auth-email"></span>
          <button class="auth-logout" id="auth-logout" type="button">로그아웃</button>
        </div>
      </aside>
      <section class="view-shell" aria-live="polite">
        <div id="view-container"><div class="view-loading">불러오는 중</div></div>
      </section>
    </main>
  </div>

  <script>
    const routes = {
      dashboard: { path: './dashboard.html?shell=1', title: '대시보드' },
      calendar: { path: './calendar.html?shell=1', title: '콘텐츠 캘린더' },
      utm: { path: './utm.html', title: 'UTM 빌더' },
      cardnews: { path: './cardnews-editor.html', title: '카드뉴스 에디터' },
      ideas: { path: './ideas.html?shell=1', title: '아이디어 노트' }
    };

    const viewContainer = document.getElementById('view-container');
    const shellTitle = document.getElementById('shell-title');
    const calHeaderActions = document.getElementById('cal-header-actions');
    const shellRefreshBtn = document.getElementById('shell-refresh');
    const shellAddBtn = document.getElementById('shell-add');
    const shellLoginBtn = document.getElementById('shell-login');

    calHeaderActions.hidden = true;

    // 캘린더 iframe 내부의 '편집 로그인' 버튼(#btn-login)은 calendar.html 자체 헤더에
    // 있고, 그 헤더는 shell-mode에서 display:none 처리되어 화면에 안 보인다.
    // 그래서 셸 쪽에 대리 버튼을 두고, 클릭은 iframe 버튼으로 위임 + 상태(텍스트/색)는
    // MutationObserver로 그대로 미러링한다.
    let loginBtnObserver = null;
    function syncShellLoginFromFrame(frameBtn) {
      if (!frameBtn) return;
      const authenticated = frameBtn.classList.contains('authenticated');
      shellLoginBtn.textContent = frameBtn.textContent;
      shellLoginBtn.classList.toggle('authenticated', authenticated);
      shellAddBtn.hidden = currentRoute() !== 'calendar' || !authenticated;
    }

    function watchCalendarLoginButton() {
      if (loginBtnObserver) {
        loginBtnObserver.disconnect();
        loginBtnObserver = null;
      }
      const frameBtn = currentFrameDocument()?.querySelector('#btn-login');
      if (!frameBtn) return;
      syncShellLoginFromFrame(frameBtn);
      loginBtnObserver = new MutationObserver(() => syncShellLoginFromFrame(frameBtn));
      loginBtnObserver.observe(frameBtn, { attributes: true, attributeFilter: ['class'], childList: true, characterData: true, subtree: true });
    }

    shellLoginBtn.addEventListener('click', () => {
      const loginBtn = currentFrameDocument()?.querySelector('#btn-login');
      if (loginBtn) loginBtn.click();
    });

    const authWidget = document.getElementById('auth-widget');
    const authEmail = document.getElementById('auth-email');
    const authLogout = document.getElementById('auth-logout');

    document.addEventListener('athome-auth-ready', (e) => {
      authWidget.hidden = false;
      authEmail.textContent = e.detail && e.detail.email ? e.detail.email : '';
    });
    authLogout.addEventListener('click', () => {
      if (typeof window.__athomeSignOut__ === 'function') window.__athomeSignOut__();
      authWidget.hidden = true;
    });

    function currentFrameDocument() {
      return viewContainer.querySelector('iframe')?.contentDocument;
    }

    shellAddBtn.addEventListener('click', () => {
      const add = currentFrameDocument()?.querySelector('#btn-add');
      if (add) add.click();
    });

    shellRefreshBtn.addEventListener('click', () => {
      const calRefresh = currentFrameDocument()?.querySelector('#btn-refresh');
      if (calRefresh) calRefresh.click();
    });

    function currentRoute() {
      const route = location.hash.replace(/^#\/?/, '') || 'dashboard';
      return routes[route] ? route : 'dashboard';
    }

    function setActive(route) {
      document.querySelectorAll('.nav-link').forEach(link => {
        link.classList.toggle('active', link.dataset.route === route);
      });
      shellTitle.textContent = routes[route].title;
      const isCalendar = route === 'calendar';
      calHeaderActions.hidden = !isCalendar;
      shellLoginBtn.hidden = !isCalendar;
      // 로그인 여부는 새 iframe이 뜬 뒤 watchCalendarLoginButton()이 다시 판단한다 —
      // 그 전까지는 일단 숨겨서 아직 로그인 안 된 상태로 클릭되는 걸 방지한다.
      shellAddBtn.hidden = true;
    }

    function injectViewChromeStyles(frame, route) {
      try {
        const doc = frame.contentDocument;
        if (!doc) return;
        const style = doc.createElement('style');
        style.textContent = `
          .topbar .brand { display: none !important; }
          .topbar-in { max-width: none !important; padding-left: 24px !important; padding-right: 24px !important; }
          .site-header { display: none !important; }
        `;
        doc.head.appendChild(style);
        if (route === 'calendar') {
          doc.documentElement.style.background = '#F5F4F1';
          doc.body.style.background = '#F5F4F1';
        }
      } catch (error) {
        console.warn('[shell] view chrome style skipped', error);
      }
    }

    function loadView(route) {
      setActive(route);
      viewContainer.innerHTML = '<div class="view-loading">불러오는 중</div>';

      const frame = document.createElement('iframe');
      frame.className = 'view-frame';
      frame.title = routes[route].title;
      // 캐시 우회: 뷰를 열 때마다 현재 시각을 꼬리표로 붙여 항상 최신 파일을 받게 함
      // (GitHub Pages의 10분 강제 캐시 + iframe 고정 URL + bfcache 복원 조합으로 옛 데이터가 남는 문제 방지)
      const basePath = routes[route].path;
      frame.src = basePath + (basePath.includes('?') ? '&' : '?') + '_=' + Date.now();
      frame.onload = () => {
        injectViewChromeStyles(frame, route);
        if (route === 'calendar') watchCalendarLoginButton();
      };
      frame.onerror = () => {
        viewContainer.innerHTML = '<div class="view-error">화면을 불러오지 못했습니다.</div>';
      };

      viewContainer.replaceChildren(frame);
    }

    function route() {
      if (!location.hash) {
        location.replace('#/dashboard');
        return;
      }
      loadView(currentRoute());
    }

    window.addEventListener('hashchange', route);

    // bfcache(뒤로가기/탭 복원)로 페이지가 되살아나면 뷰를 새로 로드 — 옛 데이터 잔류 방지
    window.addEventListener('pageshow', (e) => {
      if (e.persisted) loadView(currentRoute());
    });

    route();
  </script>
</body>
</html>
