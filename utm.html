<!doctype html>
<html lang="ko">
<head>
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://accounts.google.com">
  <link rel="dns-prefetch" href="https://www.gstatic.com">
  <link rel="dns-prefetch" href="https://accounts.google.com">
  <script src="./auth.js"></script>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UTM 빌더</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
:root {
  --accent: #FF5D00;
  --accent-light: rgba(255,93,0,.08);
  --accent-mid: rgba(255,93,0,.18);
  --dark: #1A1A1A;
  --text-1: #1A1714;
  --text-2: #4A4540;
  --text-3: #6B6660;
  --text-4: #A8A29A;
  --bg-page: #F5F4F1;
  --bg-card: #FFFFFF;
  --bg-soft: #F0EEE9;
  --bg-gray: #E9E6E0;
  --border: #ECEAE5;
  --border-2: #DAD6CF;
  --radius: 12px;
  --shadow: 0 1px 2px rgba(40,30,20,.03), 0 3px 14px rgba(40,30,20,.035);
  --font: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font);
  font-size: 14px;
  color: var(--text-1);
  background: var(--bg-page);
  -webkit-font-smoothing: antialiased;
  letter-spacing: -.006em;
  line-height: 1.6;
}

/* ── 2패널 레이아웃 ── */
.layout {
  display: grid;
  grid-template-columns: 1fr 420px;
  height: calc(100vh - 58px);
  overflow: hidden;
  max-width: 1400px;
  margin: 0 auto;
}
.left-panel {
  overflow-y: auto;
  padding: 32px 32px 64px;
}
.right-panel {
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 16px;
  padding: 28px 24px;
  overflow-y: auto;
  background: var(--bg-soft);
}

/* ── 페이지 헤더 ── */
.page-header { margin-bottom: 36px; }
.page-title { font-size: 26px; font-weight: 800; letter-spacing: -.03em; color: var(--text-1); line-height: 1.2; margin-bottom: 8px; }
.page-desc { font-size: 13.5px; color: var(--text-3); line-height: 1.6; }

/* ── 카드 ── */
.card {
  background: var(--bg-card);
  border-radius: 16px;
  box-shadow: var(--shadow);
  padding: 26px 28px;
  margin-bottom: 14px;
}
.card:last-of-type { margin-bottom: 0; }
.card-h2 { font-size: 17px; font-weight: 800; letter-spacing: -.02em; color: var(--text-1); margin-bottom: 22px; }

/* ── 필드 ── */
.form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px 14px; margin-bottom: 18px; }
@media (max-width: 700px) { .form-grid { grid-template-columns: 1fr 1fr; } }
@media (max-width: 480px) { .form-grid { grid-template-columns: 1fr; } }
.field { display: block; margin-bottom: 0; }
.field-label {
  display: flex; align-items: baseline; gap: 6px;
  font-size: 10.5px; font-weight: 700; color: var(--text-3);
  letter-spacing: .06em; text-transform: uppercase; margin-bottom: 7px;
}
.field-label .required { font-size: 10px; font-weight: 700; color: var(--accent); text-transform: none; letter-spacing: 0; }
.field-label .optional {
  font-size: 10px; font-weight: 600; color: var(--text-4); text-transform: none; letter-spacing: 0;
  background: var(--bg-gray); border-radius: 4px; padding: 1px 5px;
}
.field input {
  width: 100%; border: 1.5px solid var(--border-2);
  border-radius: 9px; padding: 9px 12px;
  font-family: var(--font); font-size: 13px; color: var(--text-1);
  background: var(--bg-card); transition: border-color .15s, box-shadow .15s; outline: none;
}
.field input::placeholder { color: var(--text-4); }
.field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }

/* ── 생성된 URL (생성기 카드 내부 inset) ── */
.generated-box {
  background: var(--bg-soft);
  border-radius: 12px;
  padding: 16px 18px;
  margin-bottom: 18px;
}
.generated-head {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  margin-bottom: 10px;
}
.generated-head span {
  font-size: 10.5px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
  color: var(--text-2);
}
.generated-head button {
  background: var(--bg-card); border: 1.5px solid var(--border-2);
  border-radius: 7px; padding: 5px 11px;
  font-family: var(--font); font-size: 12px; font-weight: 700;
  color: var(--text-2); cursor: pointer; transition: all .14s; white-space: nowrap;
}
.generated-head button:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
.generated-head button:disabled { opacity: .4; cursor: default; pointer-events: none; }
.generated-head button.copied { border-color: #059669; color: #059669; background: rgba(5,150,105,.06); }
.generated-url {
  font-size: 12.5px; color: var(--text-1); line-height: 1.65;
  word-break: break-all;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
}
.generated-url .base { color: var(--text-2); }
.generated-url .sep { color: var(--accent); opacity: .8; }
.generated-url .param-key { color: #CC3D00; font-weight: 700; }
.generated-url .param-val { color: var(--text-1); }
.output-empty { color: var(--text-3); font-style: italic; font-family: var(--font); font-size: 12.5px; }

/* ── 가이드 (우패널) ── */
.guide-card {
  background: var(--bg-card);
  border-radius: 14px;
  padding: 20px 22px;
  box-shadow: var(--shadow);
}
.guide-card.panel-secondary {
  background: transparent;
  box-shadow: none;
  padding: 16px 4px;
}
.guide-card.panel-secondary .guide-card-title { font-size: 10px; margin-bottom: 12px; }
.guide-card-title {
  font-size: 11px; font-weight: 700; color: var(--text-4);
  letter-spacing: .06em; text-transform: uppercase;
  margin-bottom: 14px; display: flex; align-items: center; gap: 7px;
}

/* ── 우패널: 채널별 빠른 복사 프리셋 ── */
.qc-group { margin-bottom: 14px; }
.qc-group:last-child { margin-bottom: 0; }
.qc-group-title {
  font-size: 10px; font-weight: 800; color: var(--text-4);
  letter-spacing: .07em; text-transform: uppercase; margin-bottom: 8px;
}
.qc-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.qc-tag {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--bg-card); border: 1px solid var(--border-2); border-radius: 8px;
  padding: 6px 10px; font-family: var(--font); font-size: 12px; font-weight: 600;
  color: var(--text-2); cursor: pointer; transition: all .12s; white-space: nowrap;
}
.qc-tag:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
.qc-tag .qc-ico { font-size: 10px; color: var(--text-4); }
.qc-tag:hover .qc-ico { color: var(--accent); }

/* ── 우패널: Pro Tip ── */
.pro-tip {
  background: var(--bg-card); border-radius: 14px; padding: 16px 18px;
  box-shadow: var(--shadow);
}
.pro-tip .pt-title { font-size: 11.5px; font-weight: 800; color: var(--text-1); margin-bottom: 6px; }
.pro-tip .pt-body { font-size: 12px; color: var(--text-3); line-height: 1.6; }

/* ── 생성 히스토리 (좌패널 테이블) ── */
.history-card-h { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 18px; }
.history-empty { font-size: 12.5px; color: var(--text-4); font-style: italic; padding: 8px 0; }
.history-table { width: 100%; border-collapse: collapse; }
.history-table th {
  text-align: left; font-size: 10.5px; font-weight: 700; color: var(--text-4);
  letter-spacing: .05em; text-transform: uppercase; padding: 0 10px 10px 0;
  border-bottom: 1px solid var(--border);
}
.history-table td { padding: 12px 10px 12px 0; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: top; }
.history-table tr:last-child td { border-bottom: none; }
.history-table .h-campaign { cursor: pointer; }
.history-table .h-campaign-name { font-weight: 700; color: var(--text-1); }
.history-table .h-url { font-size: 11px; color: var(--text-4); font-family: 'SF Mono', monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 260px; display: block; margin-top: 2px; }
.history-table .h-date { color: var(--text-3); white-space: nowrap; }
.chan-badge { display: inline-block; font-size: 10.5px; font-weight: 700; padding: 2px 8px; border-radius: 5px; }
.history-table .h-actions { display: flex; gap: 4px; }
.history-table .h-btn {
  flex-shrink: 0; border: 1px solid var(--border-2); background: var(--bg-card);
  border-radius: 6px; width: 26px; height: 26px; font-size: 12px; color: var(--text-3);
  cursor: pointer; display: grid; place-items: center; transition: all .12s;
}
.history-table .h-btn:hover { border-color: var(--accent); color: var(--accent); }
.history-tools { display: flex; gap: 6px; }
.history-tools button {
  display: inline-flex; align-items: center; justify-content: center;
  width: 30px; height: 30px; border: 1px solid var(--border-2); background: var(--bg-card);
  border-radius: 8px; color: var(--text-3); cursor: pointer; transition: all .12s; font-size: 13px;
}
.history-tools button:hover { border-color: var(--accent); color: var(--accent); }

/* ── 액션 버튼 ── */
.actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
.actions .primary {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--accent); color: #fff; border: none;
  border-radius: 9px; padding: 10px 18px;
  font-family: var(--font); font-size: 13.5px; font-weight: 700;
  cursor: pointer; transition: opacity .14s;
}
.actions .primary:hover { opacity: .88; }
.actions .primary:disabled { opacity: .4; cursor: default; }
.actions .secondary {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--bg-card); color: var(--text-2);
  border: 1.5px solid var(--border-2); border-radius: 9px;
  padding: 10px 18px; font-family: var(--font); font-size: 13.5px; font-weight: 600;
  cursor: pointer; transition: all .14s;
}
.actions .secondary:hover { border-color: var(--text-4); color: var(--text-1); }

/* ── 토스트 ── */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(10px);
  background: var(--dark); color: #fff;
  border-radius: 9px; padding: 9px 16px;
  font-size: 13px; font-weight: 600;
  box-shadow: 0 8px 32px rgba(0,0,0,.2);
  pointer-events: none; opacity: 0; transition: all .2s;
  white-space: nowrap; z-index: 9999;
  display: flex; align-items: center; gap: 7px;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── 반응형 ── */
@media (max-width: 900px) {
  .layout { grid-template-columns: 1fr; height: auto; overflow: visible; }
  .right-panel { border-left: none; border-top: 1px solid var(--border); }
}
@media (max-width: 600px) {
  .left-panel { padding: 24px 16px 48px; }
  .right-panel { padding: 20px 16px; }
}
</style>
</head>
<body>

<div class="layout">

  <!-- ── 좌패널: 폼 ── -->
  <div class="left-panel">

    <div class="page-header">
      <h1 class="page-title">UTM 링크 빌더</h1>
      <p class="page-desc">채용 공고·콘텐츠 URL에 UTM 파라미터를 붙여 유입 경로를 정확하게 추적하세요.</p>
    </div>

    <!-- Campaign Link Generator (통합 카드) -->
    <div class="card">
      <div class="card-h2">Campaign Link Generator</div>

      <form id="utmForm" onsubmit="return false;">
        <div class="form-grid">
          <label class="field">
            <span class="field-label">웹사이트 URL <span class="required">필수</span></span>
            <input type="url" id="f-url" placeholder="https://career.athomecorp.com/jobs" oninput="generate()" autocomplete="off" spellcheck="false">
          </label>
          <label class="field">
            <span class="field-label">캠페인명</span>
            <input type="text" id="f-campaign" placeholder="recruitment_july_2026" oninput="generate()" autocomplete="off">
          </label>
          <label class="field">
            <span class="field-label">소스 <span class="required">필수</span></span>
            <input type="text" id="f-source" placeholder="linkedin" oninput="generate()" autocomplete="off">
          </label>
          <label class="field">
            <span class="field-label">매체 <span class="required">필수</span></span>
            <input type="text" id="f-medium" placeholder="social" oninput="generate()" autocomplete="off">
          </label>
          <label class="field">
            <span class="field-label">세부 태그 <span class="optional">content/term</span></span>
            <input type="text" id="f-content" placeholder="designer_post" oninput="generate()" autocomplete="off">
          </label>
        </div>

        <div class="generated-box" id="output-card">
          <div class="generated-head">
            <span id="output-label">생성된 URL</span>
            <button type="button" id="copy-btn" onclick="copyGenerated()" disabled>복사</button>
          </div>
          <p class="generated-url" id="output-url"><span class="output-empty">URL, 소스, 매체를 입력하면 링크가 완성됩니다.</span></p>
        </div>

        <div class="actions">
          <button class="primary" type="submit" id="btn-copy-main" onclick="saveToHistory()" disabled>히스토리에 저장</button>
          <button class="secondary" type="button" id="clearFields" onclick="resetForm()">필드 초기화</button>
        </div>
      </form>
    </div>

    <!-- 생성 히스토리 (테이블) -->
    <div class="card">
      <div class="history-card-h">
        <span class="card-h2" style="margin-bottom:0;">History</span>
        <div class="history-tools">
          <button id="exportHistory" type="button" onclick="exportHistory()" title="내보내기">⇧</button>
          <button id="deleteHistory" type="button" onclick="clearHistory()" title="전체 삭제">⌫</button>
        </div>
      </div>
      <div id="history-list"></div>
    </div>

  </div>

  <!-- ── 우패널: 프리셋 + 팁 ── -->
  <div class="right-panel">

    <!-- 채널별 빠른 복사 프리셋 -->
    <div class="guide-card panel-secondary">
      <div class="guide-card-title">Quick-Copy Presets</div>

      <div class="qc-group">
        <div class="qc-group-title">블로그</div>
        <div class="qc-tags">
          <button class="qc-tag" onclick="applyQuickCopy('blog','referral','jia_interview')">김지아님 인터뷰 ↗</button>
          <button class="qc-tag" onclick="applyQuickCopy('blog','referral','gyu_interview')">최규성님 인터뷰 ↗</button>
          <button class="qc-tag" onclick="applyQuickCopy('blog','referral','day_interview')">유다영님 인터뷰 ↗</button>
          <button class="qc-tag" onclick="applyQuickCopy('blog','referral','cpr_making')">코스맥스 연구원 ↗</button>
        </div>
      </div>

      <div class="qc-group">
        <div class="qc-group-title">링크드인</div>
        <div class="qc-tags">
          <button class="qc-tag" onclick="applyQuickCopy('linkedin','social','jia_interview')">김지아님 인터뷰 ↗</button>
          <button class="qc-tag" onclick="applyQuickCopy('linkedin','social','gyu_interview')">최규성님 인터뷰 ↗</button>
          <button class="qc-tag" onclick="applyQuickCopy('linkedin','social','room_of_lsy')">서영님 인터뷰 ↗</button>
          <button class="qc-tag" onclick="applyQuickCopy('linkedin','social','cpr_making')">코스맥스 연구원 ↗</button>
        </div>
      </div>
    </div>

    <!-- Pro Tip -->
    <div class="pro-tip">
      <div class="pt-title">💡 Pro Tip</div>
      <div class="pt-body">utm_source·medium은 소문자로, 여러 단어는 띄어쓰기 대신 언더스코어(_)로 이어주세요. 나중에 GA4에서 채널별로 집계할 때 헷갈리지 않아요.</div>
    </div>

  </div>
</div>

<div id="toast">
  <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M3 8l4 4 6-7" stroke="#86efac" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  클립보드에 복사됐어요!
</div>

<script>
  let generatedUrl = '';

  function slug(str) {
    return str.trim().toLowerCase().replace(/\s+/g, '_');
  }

  function generate() {
    const raw = document.getElementById('f-url').value.trim();
    const source = slug(document.getElementById('f-source').value);
    const medium = slug(document.getElementById('f-medium').value);
    const campaign = slug(document.getElementById('f-campaign').value);
    const content = slug(document.getElementById('f-content').value);

    const outputEl = document.getElementById('output-url');
    const copyBtn = document.getElementById('copy-btn');
    const saveBtn = document.getElementById('btn-copy-main');

    if (!raw || !source || !medium) {
      outputEl.innerHTML = '<span class="output-empty">URL, 소스, 매체를 입력하면 링크가 완성됩니다.</span>';
      generatedUrl = '';
      copyBtn.disabled = true;
      saveBtn.disabled = true;
      return;
    }

    const sep = raw.includes('?') ? '&' : '?';
    const params = [['utm_source', source], ['utm_medium', medium]];
    if (campaign) params.push(['utm_campaign', campaign]);
    if (content) params.push(['utm_content', content]);

    generatedUrl = raw + sep + params.map(([k, v]) => `${k}=${encodeURIComponent(v)}`).join('&');

    const paramHtml = params.map(([k, v], i) => {
      const prefix = i === 0 ? '' : '&amp;';
      return `${prefix}<span class="param-key">${k}</span>=<span class="param-val">${encodeURIComponent(v)}</span>`;
    }).join('');

    outputEl.innerHTML = `<span class="base">${escHtml(raw)}${sep}</span>${paramHtml}`;
    copyBtn.disabled = false;
    saveBtn.disabled = false;
    copyBtn.classList.remove('copied');
    copyBtn.textContent = '복사';
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function copyGenerated() {
    if (!generatedUrl) return;
    navigator.clipboard.writeText(generatedUrl).then(() => {
      const copyBtn = document.getElementById('copy-btn');
      copyBtn.classList.add('copied');
      copyBtn.textContent = '복사됨';
      showToast('클립보드에 복사됐어요!');
      setTimeout(() => {
        copyBtn.classList.remove('copied');
        copyBtn.textContent = '복사';
      }, 2200);
    });
  }

  function saveToHistory() {
    if (!generatedUrl) return;
    addToHistory(generatedUrl);
    const saveBtn = document.getElementById('btn-copy-main');
    const original = saveBtn.textContent;
    saveBtn.textContent = '저장됨 ✓';
    showToast('히스토리에 저장됐어요!');
    setTimeout(() => { saveBtn.textContent = original; }, 2200);
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.lastChild.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1800);
  }

  function resetForm() {
    ['f-url','f-source','f-medium','f-campaign','f-content'].forEach(id => {
      document.getElementById(id).value = '';
    });
    generate();
  }

  /* ── 우패널 Quick-Copy Presets ── */
  function applyQuickCopy(source, medium, content) {
    document.getElementById('f-source').value = source;
    document.getElementById('f-medium').value = medium;
    document.getElementById('f-content').value = content || '';
    generate();
    document.getElementById('f-url').focus();
  }

  /* ── 생성 히스토리 (localStorage) ── */
  const HISTORY_KEY = 'athome-utm-history';
  function loadHistory() { try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch { return []; } }
  function saveHistory(list) { try { localStorage.setItem(HISTORY_KEY, JSON.stringify(list)); } catch {} }
  function relTime(t) {
    const s = Math.floor((Date.now() - t) / 1000);
    if (s < 60) return '방금';
    if (s < 3600) return Math.floor(s / 60) + '분 전';
    if (s < 86400) return Math.floor(s / 3600) + '시간 전';
    return Math.floor(s / 86400) + '일 전';
  }
  function addToHistory(url) {
    const list = loadHistory().filter(h => h.u !== url);
    list.unshift({ u: url, t: Date.now() });
    saveHistory(list.slice(0, 30));
    renderHistory();
  }
  function removeHistory(i) {
    const list = loadHistory();
    list.splice(i, 1);
    saveHistory(list);
    renderHistory();
  }
  function clearHistory() {
    if (!confirm('생성 기록을 모두 지울까요?')) return;
    saveHistory([]);
    renderHistory();
  }
  function copyHistoryItem(i) {
    const h = loadHistory()[i];
    if (!h) return;
    navigator.clipboard.writeText(h.u).then(() => {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 1800);
    });
  }
  // 히스토리 항목 클릭 → 폼으로 불러오기 (UTM 파라미터는 필드로, 나머지는 원본 URL로 분해)
  function loadHistoryItem(i) {
    const h = loadHistory()[i];
    if (!h) return;
    try {
      const url = new URL(h.u);
      const p = url.searchParams;
      document.getElementById('f-source').value   = p.get('utm_source')   || '';
      document.getElementById('f-medium').value   = p.get('utm_medium')   || '';
      document.getElementById('f-campaign').value = p.get('utm_campaign') || '';
      document.getElementById('f-content').value  = p.get('utm_content')  || '';
      ['utm_source','utm_medium','utm_campaign','utm_content','utm_term'].forEach(k => p.delete(k));
      document.getElementById('f-url').value = url.origin + url.pathname + (p.toString() ? '?' + p.toString() : '') + url.hash;
      generate();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } catch {}
  }
  const SOURCE_COLORS = {
    linkedin: { bg: 'rgba(74,119,181,.12)', fg: '#4A77B5' },
    blog: { bg: 'rgba(5,150,105,.12)', fg: '#059669' },
    youtube: { bg: 'rgba(224,43,43,.12)', fg: '#C0281F' },
    google: { bg: 'rgba(26,26,26,.08)', fg: '#4A4540' },
    kakao: { bg: 'rgba(224,138,79,.16)', fg: '#B4611E' },
    newsletter: { bg: 'rgba(124,58,237,.12)', fg: '#7C3AED' },
  };
  function sourceBadge(source) {
    const c = SOURCE_COLORS[source] || { bg: 'var(--bg-gray)', fg: 'var(--text-3)' };
    return `<span class="chan-badge" style="background:${c.bg};color:${c.fg}">${escHtml(source || '—')}</span>`;
  }
  function formatDate(t) {
    const d = new Date(t);
    return `${d.getFullYear()}. ${d.getMonth() + 1}. ${d.getDate()}.`;
  }

  function exportHistory() {
    const list = loadHistory();
    if (!list.length) { showToast('내보낼 히스토리가 없어요'); return; }
    navigator.clipboard.writeText(list.map(h => h.u).join('\n')).then(() => {
      showToast(`${list.length}개 링크를 클립보드에 복사했어요`);
    });
  }

  function renderHistory() {
    const list = loadHistory();
    const el = document.getElementById('history-list');
    if (!list.length) {
      el.innerHTML = '<div class="history-empty">복사한 링크가 여기에 쌓입니다.</div>';
      return;
    }
    const indexed = list.map((h, i) => ({ h, i }));
    const rows = indexed.map(({ h, i }) => {
      let source = '', campaign = '';
      try {
        const p = new URL(h.u).searchParams;
        source = p.get('utm_source') || '';
        campaign = p.get('utm_campaign') || '';
      } catch {}
      return `
      <tr>
        <td class="h-campaign" onclick="loadHistoryItem(${i})" title="클릭하면 폼으로 불러옵니다&#10;${escHtml(h.u)}">
          <div class="h-campaign-name">${escHtml(campaign || '(캠페인 없음)')}</div>
          <span class="h-url">${escHtml(h.u.replace(/^https?:\/\//, ''))}</span>
        </td>
        <td>${sourceBadge(source)}</td>
        <td class="h-date">${formatDate(h.t)}</td>
        <td>
          <div class="h-actions">
            <button class="h-btn" onclick="copyHistoryItem(${i})" title="복사">⧉</button>
            <button class="h-btn" onclick="removeHistory(${i})" title="삭제">×</button>
          </div>
        </td>
      </tr>`;
    }).join('');
    el.innerHTML = `
      <table class="history-table">
        <thead><tr><th>캠페인</th><th>소스</th><th>날짜</th><th>작업</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  renderHistory();
  generate();
</script>
</body>
</html>
